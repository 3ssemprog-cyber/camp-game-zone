<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — تسجيل الدخول</title>
<link rel="stylesheet" href="theme.css">
<style>
  body{display:flex;align-items:center;justify-content:center;padding:16px}
  .bg-glow{position:fixed;width:500px;height:500px;background:radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
  .login-card{position:relative;z-index:1;background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;width:100%;max-width:380px;overflow:hidden}
  .lc-head{padding:30px 26px 22px;text-align:center;border-bottom:0.5px solid var(--border);background:var(--bg3)}
  .logo-big{width:64px;height:64px;background:linear-gradient(135deg,#1E3A8A,#3B82F6);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;font-weight:700;color:#fff;box-shadow:0 8px 24px rgba(59,130,246,0.25)}
  .app-title{font-size:20px;font-weight:700;color:var(--text1)}
  .app-sub{font-size:12px;color:var(--text3);margin-top:4px}
  .lc-body{padding:26px;display:flex;flex-direction:column;gap:14px}
  .err-box{padding:9px 13px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:9px;font-size:12px;color:#FCA5A5;display:none}
  .field{display:flex;flex-direction:column;gap:5px}
  .loading{text-align:center;color:var(--text3);font-size:12px;display:none}
  .lc-foot{padding:11px 26px;border-top:0.5px solid var(--border);text-align:center;font-size:11px;color:var(--text3)}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="login-card">
  <div class="lc-head">
    <div class="logo-big">C</div>
    <div class="app-title">Camp Game Zone</div>
    <div class="app-sub">نظام إدارة الكافيه والبلايستيشن</div>
  </div>
  <div class="lc-body">
    <div class="err-box" id="err-box"></div>
    <div class="field">
      <div class="fl">البريد الإلكتروني</div>
      <input class="finp" id="email" type="email" placeholder="example@camp.com" autocomplete="off">
    </div>
    <div class="field">
      <div class="fl">كلمة السر</div>
      <input class="finp" id="password" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary-full" id="login-btn" onclick="doLogin()">دخول</button>
    <div class="loading" id="loading">جاري التحقق...</div>
  </div>
  <div class="lc-foot">Camp Game Zone © 2026</div>
</div>
<script type="module">
import { auth, signInWithEmailAndPassword, onAuthStateChanged } from './firebase.js';
onAuthStateChanged(auth, (user) => { if (user) window.location.href = 'dashboard.html'; });
window.doLogin = async function() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err-box');
  const btn = document.getElementById('login-btn');
  const loading = document.getElementById('loading');
  err.style.display = 'none';
  if (!email || !password) { err.textContent = 'اكتب الإيميل وكلمة السر'; err.style.display = 'block'; return; }
  btn.disabled = true; loading.style.display = 'block';
  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = 'dashboard.html';
  } catch (e) {
    err.textContent = 'الإيميل أو كلمة السر غلط';
    err.style.display = 'block';
    btn.disabled = false; loading.style.display = 'none';
  }
}
</script>
</body>
</html>

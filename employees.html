<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — الموظفين</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:900px;margin:0 auto;padding:20px 16px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
.emp-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden}
.ec-head{padding:12px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.av-b{background:#1E3A8A;color:#93C5FD}
.av-g{background:#064E3B;color:#6EE7B7}
.av-a{background:#451A03;color:#FCD34D}
.av-p{background:#2E1065;color:#C4B5FD}
.en{font-size:13px;font-weight:700;color:var(--text1)}
.er{font-size:11px;color:var(--text3);margin-top:1px}
.ec-body{padding:10px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.stat{background:var(--bg3);border-radius:9px;padding:8px;text-align:center}
.sl{font-size:10px;color:var(--text3);margin-bottom:3px}
.sv{font-size:14px;font-weight:700;color:var(--text1)}
.sv.g{color:#6EE7B7}
.sv.r{color:#FCA5A5}
.ec-foot{padding:8px 14px;border-top:0.5px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:6px}
.btn-det{padding:6px;border:0.5px solid var(--border);border-radius:9px;font-size:11px;cursor:pointer;text-align:center;background:var(--bg3);color:var(--text2);font-family:'Cairo',sans-serif}
.btn-sal{padding:6px;border:0.5px solid var(--accent);border-radius:9px;font-size:11px;cursor:pointer;text-align:center;background:#1E3A8A;color:#93C5FD;font-weight:600;font-family:'Cairo',sans-serif}
.tb-flex{display:flex;align-items:center;gap:8px}
.draws-list{display:flex;flex-direction:column;gap:5px;max-height:160px;overflow-y:auto}
.draw-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg3);border-radius:9px;font-size:12px}
.draw-date{color:var(--text3)}
.draw-amt{font-weight:700;color:#FCA5A5}
.sal-box{padding:10px 12px;background:var(--green-bg);border:0.5px solid var(--green);border-radius:9px}
.sal-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.sal-row:last-child{margin-bottom:0;font-size:14px;font-weight:700;padding-top:6px;border-top:0.5px solid var(--border);margin-top:4px}
.deficit-box{padding:9px 12px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:9px;font-size:12px;color:#FCA5A5}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex">
    <div class="logo">C</div>
    <div class="app-name">الموظفين</div>
  </div>
  <div class="tb-flex">
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <button class="btn-primary" id="add-btn" onclick="openAddEmp()" style="display:none">+ إضافة موظف</button>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div style="font-size:12px;color:var(--text3);margin-bottom:12px" id="emp-count">جاري التحميل...</div>
  <div class="grid" id="emp-grid"></div>
</div>

<!-- Popup -->
<div id="ovl" style="display:none" class="ovl" onclick="if(event.target===this)closeOvl()">
  <div class="pop" id="pop"></div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, hasPermission, logTransaction, fmt,
  collection, getDocs, doc, getDoc, addDoc, updateDoc, deleteDoc, serverTimestamp } from './firebase.js';

const AV_CLASSES = ['av-b','av-g','av-a','av-p'];
const now = () => new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const dateStr = () => new Date().toLocaleDateString('ar-EG');

let EMPS = [], isAdm = false;

async function loadEmps(){
  try{
    const snap = await getDocs(collection(db,'employees'));
    EMPS = [];
    snap.forEach(d => EMPS.push({id:d.id,...d.data()}));
  }catch(e){ EMPS=[]; }
}

async function saveEmp(emp){
  try{
    if(emp.id && emp.id !== 'new'){
      await updateDoc(doc(db,'employees',emp.id),{
        name:emp.name, role:emp.role, phone:emp.phone,
        daily:emp.daily, days:emp.days, draws:emp.draws
      });
    }
  }catch(e){}
}

function totalDraws(emp){ return (emp.draws||[]).reduce((s,d)=>s+d.amt,0); }
function calcSalary(emp){ return emp.daily*(emp.days||0); }
function netSalary(emp){ return calcSalary(emp)-totalDraws(emp); }

function renderGrid(){
  document.getElementById('emp-count').textContent = `${EMPS.length} موظف — الشهر الحالي`;
  const g = document.getElementById('emp-grid');
  g.innerHTML = EMPS.length ? EMPS.map((e,i) => `
    <div class="emp-card">
      <div class="ec-head">
        <div class="av ${AV_CLASSES[i%4]}">${e.name?.substring(0,2)||'م'}</div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px">
            <div class="en">${e.name}</div>
            <span class="badge badge-blue">${e.role}</span>
          </div>
          <div class="er">${e.phone||''}</div>
        </div>
      </div>
      <div class="ec-body">
        <div class="stat"><div class="sl">اليومية</div><div class="sv">${e.daily} ج</div></div>
        <div class="stat"><div class="sl">أيام الشغل</div><div class="sv g">${e.days||0} يوم</div></div>
        <div class="stat"><div class="sl">السحوبات</div><div class="sv r">${totalDraws(e)} ج</div></div>
      </div>
      <div class="ec-foot">
        <div class="btn-det" onclick="openDetails('${e.id}')">تفاصيل السحوبات</div>
        ${isAdm?`<div class="btn-sal" onclick="openCloseSalary('${e.id}')">تقفيل مرتب</div>`:'<div class="btn-sal" style="opacity:.4;cursor:not-allowed">تقفيل مرتب</div>'}
        ${isAdm?`<div class="btn-det" style="background:var(--red-bg);border-color:var(--red);color:#FCA5A5;grid-column:1/-1" onclick="delEmp('${e.id}','${e.name}')">حذف الموظف</div>`:''}
      </div>
    </div>`).join('')
  : '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text3)">لا يوجد موظفين — اضغط إضافة موظف</div>';
}

window.openDetails = function(id){
  const e = EMPS.find(x=>x.id===id);
  if(!e) return;
  const ovl=document.getElementById('ovl'), pop=document.getElementById('pop');
  const renderDraws = () => {
    const dl = document.getElementById('draws-list');
    if(!dl) return;
    dl.innerHTML = (e.draws||[]).length
      ? (e.draws||[]).map((d,i)=>`
          <div class="draw-row">
            <span class="draw-date">${d.date}</span>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="draw-amt">${d.amt} ج</span>
              ${isAdm?`<span style="font-size:10px;color:var(--red);cursor:pointer" onclick="delDraw('${id}',${i})">حذف</span>`:''}
            </div>
          </div>`)
          .join('')
      : '<div style="text-align:center;font-size:11px;color:var(--text3);padding:10px">لا يوجد سحوبات</div>';
    const tot = document.getElementById('draws-tot');
    if(tot) tot.textContent = fmt(totalDraws(e));
  };

  pop.innerHTML=`
    <div class="pop-head"><span>سحوبات — ${e.name}</span></div>
    <div class="pop-body">
      <div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:9px;font-size:12px">
        <span style="color:var(--text2)">المرتب المستحق</span>
        <span style="font-size:14px;font-weight:700;color:#6EE7B7">${fmt(calcSalary(e))}</span>
      </div>
      <div>
        <div class="fl">السحوبات هذا الشهر</div>
        <div class="draws-list" id="draws-list"></div>
      </div>
      ${isAdm?`
      <div>
        <div class="fl">إضافة سحب جديد</div>
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px">
          <input class="finp" id="draw-date" placeholder="التاريخ" value="${dateStr()}">
          <input class="finp" id="draw-amt" type="text" inputmode="decimal" placeholder="المبلغ">
          <button class="btn-primary" onclick="addDraw('${id}')">+ إضافة</button>
        </div>
      </div>`:''}
      <div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:9px;font-size:12px">
        <span style="color:#FCA5A5">إجمالي السحوبات</span>
        <span style="font-size:14px;font-weight:700;color:#FCA5A5" id="draws-tot">${fmt(totalDraws(e))}</span>
      </div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">رجوع</div>
      ${isAdm?`<div class="btn-confirm" onclick="openCloseSalary('${id}')">تقفيل مرتب</div>`:'<div class="btn-confirm" style="opacity:.4;cursor:not-allowed">تقفيل مرتب</div>'}
    </div>`;
  ovl.style.display='flex';
  renderDraws();

  window.addDraw = async function(eid){
    const amt = parseFloat(document.getElementById('draw-amt')?.value?.replace(',','.')||0);
    const date = document.getElementById('draw-date')?.value||dateStr();
    if(!amt||amt<=0) return alert('اكتب مبلغ صح');
    const emp = EMPS.find(x=>x.id===eid);
    if(!emp.draws) emp.draws=[];
    emp.draws.push({date,amt});
    await saveEmp(emp);
    // Also log as daily expense
    try{
      await addDoc(collection(db,'daily_expenses'),{
        name:`سحب ${emp.name}`, amt, cat:`سحب ${emp.name}`,
        time:now(), date:dateStr(), timestamp:serverTimestamp()
      });
    }catch(er){}
    logTransaction(`إضافة سحب ${emp.name}`,`${amt} ج`,'emp');
    renderDraws(); renderGrid();
    document.getElementById('draw-amt').value='';
  };

  window.delDraw = async function(eid,idx){
    const emp = EMPS.find(x=>x.id===eid);
    emp.draws.splice(idx,1);
    await saveEmp(emp);
    logTransaction(`حذف سحب ${emp.name}`,'','emp');
    renderDraws(); renderGrid();
  };
};

window.openCloseSalary = function(id){
  const e = EMPS.find(x=>x.id===id);
  if(!e) return;
  const salary=calcSalary(e), draws=totalDraws(e), net=netSalary(e);
  const isDeficit = net < 0;
  const ovl=document.getElementById('ovl'), pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>تقفيل مرتب — ${e.name}</span></div>
    <div class="pop-body">
      <div class="sal-box">
        <div class="sal-row"><span style="color:#6EE7B7">اليومية × أيام الشغل</span><span style="color:#6EE7B7">${e.daily} × ${e.days||0} = ${fmt(salary)}</span></div>
        <div class="sal-row"><span style="color:#FCA5A5">إجمالي السحوبات</span><span style="color:#FCA5A5">− ${fmt(draws)}</span></div>
        <div class="sal-row"><span style="color:${isDeficit?'#FCA5A5':'#6EE7B7'}">الصافي المستحق</span><span style="color:${isDeficit?'#FCA5A5':'#6EE7B7'}">${fmt(Math.abs(net))} ${isDeficit?'(عجز)':''}</span></div>
      </div>
      ${isDeficit?`<div class="deficit-box">تنبيه: السحوبات أكبر من المرتب — العجز ${fmt(Math.abs(net))} هيتسجل على ${e.name} للشهر الجاي</div>`:''}
      <div>
        <div class="fl">ملاحظة (اختياري)</div>
        <input class="finp" id="sal-note" placeholder="مثلاً: تم الصرف نقدي...">
      </div>
      <div style="padding:8px 10px;background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:9px;font-size:11px;color:#FCD34D">
        بعد التقفيل — أيام الشغل والسحوبات هترجع صفر للشهر الجديد
      </div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إلغاء</div>
      <div class="btn-confirm" onclick="confirmCloseSalary('${id}',${net})">تأكيد التقفيل</div>
    </div>`;
  ovl.style.display='flex';
};

window.confirmCloseSalary = async function(id, net){
  const e = EMPS.find(x=>x.id===id);
  const note = document.getElementById('sal-note')?.value||'';
  const salary=calcSalary(e), draws=totalDraws(e);
  const isDeficit = net < 0;
  // احفظ نسخة من السحوبات والأيام قبل ما تتمسح
  const drawsSnap = [...(e.draws||[])];
  const daysSnap = e.days||0;
  const carryDraws = isDeficit ? [{date:dateStr(), amt:Math.abs(net), note:'عجز محمول'}] : [];
  e._draws_snap = drawsSnap;
  e._days_snap = daysSnap;
  e.days=0; e.draws=carryDraws;
  await saveEmp(e);

  // سجّل تقفيل المرتب في salary_closing عشان التقارير تشوفه
  try{
    const now2=new Date();
    const mk=`${now2.getFullYear()}-${String(now2.getMonth()+1).padStart(2,'0')}`;
    await addDoc(collection(db,'salary_closing'),{
      empId:e.id,
      empName:e.name,
      salary:salary,
      draws:draws,
      net:Math.abs(net),
      isDeficit:isDeficit,
      monthKey:mk,
      date:dateStr(),
      timestamp:serverTimestamp()
    });
  }catch(er){ console.log('salary_closing error:',er); }

  logTransaction(`تقفيل مرتب ${e.name}`, `${fmt(Math.abs(net))} ${isDeficit?'عجز':'صافي'}`, 'emp');
  closeOvl();
  showSalaryReceipt(e, salary, draws, net, isDeficit, drawsSnap, daysSnap);
  renderGrid();
};

function showSalaryReceipt(e, salary, draws, net, isDeficit, drawsSnap, daysSnap){
  const drawsList = (e.draws_snapshot||[]).length
    ? e.draws_snapshot
    : [];
  const rcptHTML = buildSalaryReceipt(e.name, salary, e.daily, daysSnap||0, draws, drawsSnap||[], net, isDeficit);
  const ovl=document.getElementById('ovl'), pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>وصل مرتب — ${e.name}</span></div>
    <div style="display:flex;justify-content:center;padding:14px 10px;background:var(--bg3)">
      <div id="sal-rcpt" style="width:220px;background:#fff;border-radius:8px;border:0.5px solid #ddd;font-family:'Cairo',sans-serif;font-size:11px;color:#000;direction:rtl;overflow:hidden">
        ${rcptHTML}
      </div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إغلاق</div>
      <div class="btn-confirm" onclick="printSalaryRcpt()">طباعة</div>
    </div>`;
  ovl.style.display='flex';

function doThermalPrint(htmlContent){
  const old=document.getElementById('thermal-iframe');
  if(old)old.remove();
  const iframe=document.createElement('iframe');
  iframe.id='thermal-iframe';
  iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none';
  document.body.appendChild(iframe);
  const doc=iframe.contentWindow.document;
  doc.open();
  doc.write(htmlContent);
  doc.close();
  iframe.onload=function(){setTimeout(function(){iframe.contentWindow.focus();iframe.contentWindow.print();},400);};
}
function buildPrintHTML(content){
  return `<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><style>@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');
@page{size:80mm auto;margin:0}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Cairo',sans-serif;color:#000;direction:rtl;-webkit-print-color-adjust:exact;print-color-adjust:exact}
html,body{width:80mm;margin:0;padding:0;background:#fff;font-size:12px;font-weight:700}
.rh{text-align:center;padding:8px 4px 6px;border-bottom:2px dashed #000;margin-bottom:3px}
.rh-name{font-size:16px;font-weight:900;display:block}
.rh-sub{font-size:10px;color:#333;display:block;margin-top:2px;font-weight:700}
.rh-type,.rh-badge{font-size:11px;font-weight:900;border:1.5px solid #000;display:inline-block;padding:1px 10px;border-radius:20px;margin-top:4px}
.rm{padding:4px 4px;border-bottom:1px dashed #999;margin-bottom:3px}
.mr{display:flex;justify-content:space-between;font-size:11px;padding:1px 0;font-weight:700}
.mr span:last-child{font-weight:900}
.rsec-game{background:#e8e8e8;padding:5px 4px;border-bottom:2px dashed #999;margin-bottom:3px}
.rsec-game-title{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid #bbb}
.rsec-drinks{padding:4px 4px;border-bottom:2px dashed #999;margin-bottom:3px}
.rsec{padding:4px 4px;border-bottom:1px dashed #999;margin-bottom:2px}
.rsec-t{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;border-bottom:1px solid #ccc;padding-bottom:2px}
.rrow{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;font-weight:700}
.rrow.bold{font-weight:900}
.rrow.ok{color:#1a6a2a}
.rrow.err{color:#a00}
.rtot{display:flex;justify-content:space-between;font-size:15px;font-weight:900;border-top:2px solid #000;border-bottom:2px solid #000;padding:6px 4px;margin:3px 0}
.rp{display:flex;justify-content:space-between;font-size:11px;padding:3px 4px;border-bottom:1px dashed #999;font-weight:700}
.rf{text-align:center;padding:6px 4px;font-size:10px;color:#333;line-height:1.8;font-weight:700}
.rf-brand{font-size:13px;font-weight:900;color:#000;display:block;margin-top:2px}
.rf-dots{letter-spacing:3px;display:block;margin-bottom:3px}
div[style*="grid-template-columns"]{display:flex!important;justify-content:space-between!important;font-size:12px!important;font-weight:700!important;padding:2px 4px!important;border-bottom:1px solid #ddd!important}
div[style*="grid-template-columns"] span:first-child{flex:1!important;text-align:right!important}
div[style*="grid-template-columns"] span:nth-child(2){width:24px!important;text-align:center!important}
div[style*="grid-template-columns"] span:last-child{width:54px!important;text-align:left!important;font-weight:900!important}
div[style*="b45309"],div[style*="font-style:italic"]{color:#444!important;font-style:italic!important;font-size:10px!important;font-weight:700!important}
div[style*="padding:3px 8px"]{display:flex!important;justify-content:space-between!important;font-size:11px!important;padding:2px 4px!important;font-weight:700!important}
*{color:#000!important}
.sal-rcpt{width:80mm;direction:rtl;font-family:'Cairo',sans-serif}
</style></head><body><div style="width:80mm;direction:rtl">${content}</div></body></html>`;
}
  window.printSalaryRcpt=function(){
    const box=document.getElementById('sal-rcpt');
    if(!box)return;
    thermalPrint(box.innerHTML);
  };
}

function buildSalaryReceipt(name, salary, daily, days, draws, drawsList, net, isDeficit){
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const now=new Date();
  const monthName=months[now.getMonth()]+' '+now.getFullYear();

  let drawsRows='';
  drawsList.forEach(d=>{
    drawsRows+=`<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0">
      <span style="color:#555">${d.date}</span>
      <span style="color:#c00;font-weight:700">${parseFloat(d.amt).toFixed(2)} ج</span>
    </div>`;
  });
  if(!drawsRows) drawsRows='<div style="font-size:9px;color:#888;text-align:center;padding:3px 0">لا يوجد سحوبات</div>';

  return `
    <div style="padding:12px 10px 8px;text-align:center;border-bottom:2px dashed #ccc">
      <div style="font-size:15px;font-weight:900">Camp Game Zone</div>
      <div style="font-size:9px;color:#666;margin-top:2px">كافيه وبلايستيشن</div>
      <div style="display:inline-block;margin-top:5px;font-size:9px;font-weight:700;border:1px solid #000;padding:1px 10px;border-radius:20px">وصل مرتب</div>
    </div>
    <div style="padding:6px 10px;border-bottom:1px dashed #ccc">
      <div style="display:flex;justify-content:space-between;font-size:9px;padding:1px 0"><span style="color:#666">الموظف</span><span style="font-weight:700">${name}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:9px;padding:1px 0"><span style="color:#666">الشهر</span><span style="font-weight:700">${monthName}</span></div>
      <div style="display:flex;justify-content:space-between;font-size:9px;padding:1px 0"><span style="color:#666">التاريخ</span><span style="font-weight:700">${dateStr()}</span></div>
    </div>
    <div style="padding:6px 10px;border-bottom:2px dashed #ccc">
      <div style="font-size:8px;font-weight:700;color:#444;letter-spacing:.4px;margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid #eee">تفاصيل المرتب</div>
      <div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0"><span style="color:#555">اليومية</span><span>${parseFloat(daily).toFixed(2)} ج</span></div>

      <div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-top:1px solid #eee;margin-top:3px;font-weight:700"><span>إجمالي السحوبات</span><span style="color:#c00">${parseFloat(draws).toFixed(2)} ج</span></div>
    </div>
    <div style="padding:8px 10px;display:flex;justify-content:space-between;font-size:13px;font-weight:900;border-bottom:2px solid #000;border-top:2px solid #000;margin:2px 0">
      <span>${isDeficit?'عجز محمول للشهر الجاي':'الصافي المستحق'}</span>

    </div>`;
}

window.openAddEmp = function(){
  const ovl=document.getElementById('ovl'), pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>إضافة موظف جديد</span></div>
    <div class="pop-body">
      <div><div class="fl">الاسم</div><input class="finp" id="en" placeholder="اسم الموظف" style="width:100%"></div>
      <div><div class="fl">الوظيفة</div>
        <select class="fsel" id="er" style="width:100%">
          <option>كاشير</option><option>موظف</option><option>مشرف</option>
        </select>
      </div>
      <div><div class="fl">رقم التليفون</div><input class="finp" id="ep" placeholder="01xxxxxxxxx" style="width:100%;direction:ltr;text-align:right"></div>
      <div><div class="fl">اليومية (جنيه)</div><input class="finp" id="ed" type="text" inputmode="decimal" placeholder="مثلاً: 250" style="width:100%"></div>
      <div style="padding:8px 10px;background:var(--bg3);border:0.5px solid var(--border);border-radius:9px;font-size:11px;color:var(--text3)">
        أيام الشغل بتتحسب تلقائي من التقفيل اليومي
      </div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إلغاء</div>
      <div class="btn-confirm" onclick="addEmp()">إضافة</div>
    </div>`;
  ovl.style.display='flex';
};

window.addEmp = async function(){
  const name  = document.getElementById('en').value.trim();
  const role  = document.getElementById('er').value;
  const phone = document.getElementById('ep').value.trim();
  const daily = parseFloat(document.getElementById('ed').value.replace(',','.')||0);
  if(!name) return alert('اكتب اسم الموظف');
  if(!daily||daily<=0) return alert('اكتب اليومية');
  try{
    const ref = await addDoc(collection(db,'employees'),{
      name, role, phone, daily, days:0, draws:[], timestamp:serverTimestamp()
    });
    // Add expense category for this employee
    EMPS.push({id:ref.id,name,role,phone,daily,days:0,draws:[]});
    logTransaction(`إضافة موظف ${name}`,role,'emp');
    closeOvl(); renderGrid();
  }catch(e){ alert('حصل خطأ — حاول تاني'); }
};

window.delEmp = async function(id, name){
  if(!confirm(`هتحذف موظف "${name}" نهائياً؟`)) return;
  try{
    await deleteDoc(doc(db,'employees',id));
    EMPS = EMPS.filter(e=>e.id!==id);
    logTransaction(`حذف موظف: ${name}`,'','emp');
    renderGrid();
  }catch(e){ alert('حصل خطأ'); }
};

window.closeOvl = function(){ document.getElementById('ovl').style.display='none'; };

requireAuth(async(user,userData)=>{
  isAdm = (user.uid === ADMIN_UID || user.id === ADMIN_UID);
  const p = userData?.permissions||{};
  const hasPerm = (k) => isAdm || p[k]===true;
  document.getElementById('uname').textContent = isAdm?'Admin':(userData?.name||user.email);
  if(!hasPerm('emp.view')){ document.getElementById('emp-grid').innerHTML='<div style="padding:20px;color:var(--text3);text-align:center;grid-column:1/-1">ليس لديك صلاحية عرض الموظفين</div>'; return; }
  if(hasPerm('emp.add')) document.getElementById('add-btn').style.display='block';
  await loadEmps();
  renderGrid();
});
</script>

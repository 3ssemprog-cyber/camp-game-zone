<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — المصاريف الشهرية</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:800px;margin:0 auto;padding:20px 16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.chip{display:inline-block;padding:3px 12px;background:#1E3A8A;border:0.5px solid var(--accent);border-radius:20px;font-size:11px;color:#93C5FD;font-weight:500}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.cb-khr{background:#450A0A;color:#FCA5A5}
.cb-ejr{background:#2E1065;color:#C4B5FD}
.cb-mia{background:#1E3A8A;color:#93C5FD}
.cb-sna{background:#451A03;color:#FCD34D}
.cb-oth{background:var(--bg3);color:var(--text2)}
.del-btn{padding:3px 9px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:7px;font-size:10px;cursor:pointer;color:#FCA5A5;font-family:'Cairo',sans-serif}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex">
    <div class="logo">C</div>
    <div class="app-name">المصاريف الشهرية</div>
  </div>
  <div class="tb-flex">
    <div class="chip" id="month-chip"></div>
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div class="card" style="margin-bottom:14px">
    <div class="card-head">إضافة مصروف — الشهر الحالي</div>
    <div class="card-body">
      <div class="form-grid">
        <div>
          <div class="fl">التصنيف</div>
          <select class="fsel" id="m-cat">
            <option value="كهربا">كهربا</option>
            <option value="إيجار">إيجار</option>
            <option value="مياه">مياه</option>
            <option value="إنترنت">إنترنت</option>
            <option value="صيانة">صيانة</option>
            <option value="أخرى">أخرى</option>
          </select>
        </div>
        <div>
          <div class="fl">المبلغ (ج)</div>
          <input class="finp" id="m-amt" type="text" inputmode="decimal" placeholder="0">
        </div>
        <div style="grid-column:1/-1">
          <div class="fl">ملاحظة (اختياري)</div>
          <input class="finp" id="m-note" placeholder="أي تفاصيل...">
        </div>
        <div style="grid-column:1/-1">
          <button class="btn-primary-full" onclick="addMonthly()">+ إضافة</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tbl-wrap">
    <table class="dtbl">
      <thead><tr>
        <th style="width:120px">التصنيف</th>
        <th style="width:80px">المبلغ</th>
        <th style="width:110px">الشهر</th>
        <th>ملاحظة</th>
        <th style="width:50px">حذف</th>
      </tr></thead>
      <tbody id="m-body"></tbody>
    </table>
  </div>

  <div class="sum-bar" style="margin-top:10px">
    <span style="font-size:12px;color:var(--text2)" id="m-lbl">إجمالي مصاريف الشهر</span>
    <span style="font-size:16px;font-weight:700;color:#FCA5A5" id="m-total">0.00 ج</span>
  </div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, hasPermission, logTransaction, fmt,
  collection, getDocs, addDoc, deleteDoc, doc, serverTimestamp, query, orderBy } from './firebase.js';

const CAT_CLASS={'كهربا':'cb-khr','إيجار':'cb-ejr','مياه':'cb-mia','إنترنت':'cb-mia','صيانة':'cb-sna','أخرى':'cb-oth'};
const monthStr=()=>new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long'});
const monthKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};

let ITEMS=[], canAdd=false, canDel=false;

async function loadItems(){
  try{
    const mk=monthKey();
    const snap=await getDocs(query(collection(db,'monthly_expenses'),orderBy('timestamp','desc')));
    ITEMS=[];
    snap.forEach(d=>{ const data=d.data(); if(data.monthKey===mk) ITEMS.push({id:d.id,...data}); });
  }catch(e){ ITEMS=[]; }
}

function renderTable(){
  const ms=monthStr();
  document.getElementById('month-chip').textContent=ms;
  document.getElementById('m-lbl').textContent=`إجمالي مصاريف ${ms}`;
  const b=document.getElementById('m-body');
  b.innerHTML=ITEMS.length?ITEMS.map(i=>`
    <tr>
      <td><span class="cat-badge ${CAT_CLASS[i.cat]||'cb-oth'}">${i.cat}</span></td>
      <td style="font-weight:700;color:#FCA5A5">${fmt(i.amt)}</td>
      <td style="font-size:11px;color:var(--text3)">${i.month||ms}</td>
      <td style="font-size:10px;color:var(--text3)">${i.note||'—'}</td>
      <td>${canDel?`<div class="del-btn" onclick="delItem('${i.id}')">حذف</div>`:'—'}</td>
    </tr>`).join('')
  :'<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--text3)">لا يوجد مصاريف هذا الشهر</td></tr>';
  document.getElementById('m-total').textContent=fmt(ITEMS.reduce((s,i)=>s+i.amt,0));
}

window.addMonthly=async function(){
  if(!canAdd) return alert('ليس لديك صلاحية');
  const cat=document.getElementById('m-cat').value;
  const amt=parseFloat(document.getElementById('m-amt').value.replace(',','.')||0);
  const note=document.getElementById('m-note').value.trim();
  if(!amt||amt<=0) return alert('اكتب مبلغ صح');
  try{
    const ref=await addDoc(collection(db,'monthly_expenses'),{
      cat,amt,note,month:monthStr(),monthKey:monthKey(),timestamp:serverTimestamp()
    });
    ITEMS.unshift({id:ref.id,cat,amt,note,month:monthStr()});
    logTransaction(`إضافة مصروف شهري: ${cat}`,`${fmt(amt)}`,'exp');
    document.getElementById('m-amt').value='';
    document.getElementById('m-note').value='';
    renderTable();
  }catch(e){ alert('حصل خطأ'); }
};

window.delItem=async function(id){
  if(!canDel) return;
  try{
    await deleteDoc(doc(db,'monthly_expenses',id));
    ITEMS=ITEMS.filter(i=>i.id!==id);
    logTransaction('حذف مصروف شهري','','exp');
    renderTable();
  }catch(e){ alert('حصل خطأ'); }
};

requireAuth(async(user,userData)=>{
  const isAdm=user.uid===ADMIN_UID;
  const p=userData?.permissions||{};
  canAdd=isAdm||p['exp.add_monthly']===true;
  canDel=isAdm||p['exp.del_monthly']===true;
  if(!isAdm&&!p['exp.view_monthly']&&!p['exp.add_monthly']){window.location.href='dashboard.html';return;}
  document.getElementById('uname').textContent=isAdm?'Admin':(userData?.name||user.email);
  await loadItems();
  renderTable();
});
</script>
</body>
</html>

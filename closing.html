<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — التقفيل اليومي</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:700px;margin:0 auto;padding:20px 16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.step-bar{display:flex;align-items:center;margin-bottom:20px}
.stp{display:flex;align-items:center;gap:5px}
.stn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.stl{font-size:12px;font-weight:600}
.stp.done .stn{background:var(--green);color:#fff}
.stp.done .stl{color:#6EE7B7}
.stp.act .stn{background:var(--accent);color:#fff}
.stp.act .stl{color:#93C5FD}
.stp.off .stn{background:var(--bg3);color:var(--text3);border:0.5px solid var(--border)}
.stp.off .stl{color:var(--text3)}
.stline{flex:1;height:1px;background:var(--border);margin:0 6px}
.stline.done{background:var(--green)}
.emp-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:0.5px solid var(--border);border-radius:9px;transition:all .12s;background:var(--bg3)}
.emp-row.P{background:#064E3B;border-color:var(--green)}
.ei{display:flex;align-items:center;gap:8px}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;background:#1E3A8A;color:#93C5FD}
.en{font-size:12px;font-weight:600;color:var(--text1)}
.er{font-size:10px;color:var(--text3)}
.atg{display:flex;gap:4px}
.ab{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-family:'Cairo',sans-serif}
.ab.P{background:#064E3B;border-color:var(--green);color:#6EE7B7}
.ab.A{background:var(--red-bg);border-color:var(--red);color:#FCA5A5}
.kards{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kard{border-radius:10px;padding:12px 10px;text-align:center;border:0.5px solid}
.kl{font-size:11px;margin-bottom:5px}
.kv{font-size:18px;font-weight:700}
.k-cash{background:#064E3B;border-color:var(--green)}
.k-cash .kl{color:#6EE7B7}
.k-cash .kv{color:#6EE7B7}
.k-elec{background:#1E3A8A;border-color:var(--accent)}
.k-elec .kl{color:#93C5FD}
.k-elec .kv{color:#93C5FD}
.k-exp{background:var(--red-bg);border-color:var(--red)}
.k-exp .kl{color:#FCA5A5}
.k-exp .kv{color:#FCA5A5}
.k-net{background:#2E1065;border-color:var(--purple)}
.k-net .kl{color:#C4B5FD}
.k-net .kv{color:#C4B5FD}
.k-actual{background:var(--bg3);border-color:var(--border)}
.k-actual .kl{color:var(--text2)}
.k-actual .kv{color:var(--text1)}
.exp-row{display:flex;justify-content:space-between;padding:6px 10px;background:var(--bg3);border-radius:9px;font-size:12px}
.ainp{width:100%;padding:10px;border:0.5px solid var(--border);border-radius:9px;font-size:22px;font-weight:700;text-align:center;background:var(--bg);color:var(--text1);direction:ltr;font-family:'Cairo',sans-serif}
.ainp:focus{outline:none;border-color:var(--accent)}
.hint{font-size:10px;color:var(--text3);text-align:center;margin-top:3px}
.warn-box{padding:9px 12px;background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:9px;font-size:11px;color:#FCD34D}
.done-ic{width:56px;height:56px;border-radius:50%;background:var(--green-bg);border:0.5px solid var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:24px}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex">
    <div class="logo">C</div>
    <div class="app-name">التقفيل اليومي</div>
  </div>
  <div class="tb-flex">
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div class="step-bar">
    <div class="stp act" id="st1"><div class="stn">1</div><div class="stl">الحضور</div></div>
    <div class="stline" id="ln1"></div>
    <div class="stp off" id="st2"><div class="stn">2</div><div class="stl">الأرقام</div></div>
    <div class="stline" id="ln2"></div>
    <div class="stp off" id="st3"><div class="stn">3</div><div class="stl">التأكيد</div></div>
  </div>
  <div id="sc"></div>
  <div style="display:flex;justify-content:space-between;margin-top:12px">
    <div id="nb"></div>
    <div id="nn"></div>
  </div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, hasPermission, logTransaction, fmt,
  collection, getDocs, addDoc, updateDoc, doc, serverTimestamp, query, orderBy, where } from './firebase.js';

let step=1, actual='', note='', EMPS=[], isAdm=false;
const nowT=()=>new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const dateStr=()=>new Date().toLocaleDateString('ar-EG');
const todayKey=()=>new Date().toISOString().split('T')[0];
const monthKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};

let DATA={cash:0,elec:0,dailyExps:[],monthlyExps:[]};

async function loadData(){
  // Load employees
  try{
    const snap=await getDocs(collection(db,'employees'));
    EMPS=[];
    snap.forEach(d=>EMPS.push({id:d.id,...d.data(),present:false}));
  }catch(e){EMPS=[];}

  // Load today's POS totals
  try{
    const today=dateStr();
    const snap=await getDocs(collection(db,'pos_sessions'));
    DATA.cash=0; DATA.elec=0;
    snap.forEach(d=>{
      const s=d.data();
      if(s.date!==today)return;
      if(s.payMethod==='نقدي') DATA.cash+=s.total||0;
      else if(s.payMethod==='دفع إلكتروني') DATA.elec+=s.total||0;
      else if(s.payMethod==='جزء+جزء'){ DATA.cash+=s.total/2||0; DATA.elec+=s.total/2||0; }
    });
  }catch(e){console.log('pos load error:',e);}

  // Load today's expenses
  try{
    const tKey=todayKey();
    const snap=await getDocs(collection(db,'daily_expenses'));
    DATA.dailyExps=[];
    snap.forEach(d=>{
      const data=d.data();
      if(data.dayKey===tKey)DATA.dailyExps.push(data);
    });
  }catch(e){DATA.dailyExps=[];console.log('exp load error:',e);}
}

function totExp(){return DATA.dailyExps.reduce((s,e)=>s+(e.amt||0),0);}
function totIncome(){return DATA.cash+DATA.elec;}
function netDay(){return totIncome()-totExp();}

function go(n){
  step=n;
  [1,2,3].forEach(i=>{
    document.getElementById('st'+i).className='stp '+(i<n?'done':i===n?'act':'off');
    if(i<3)document.getElementById('ln'+i).className='stline'+(i<n?' done':'');
  });
  render(); nav();
}

function render(){
  const c=document.getElementById('sc');
  if(step===1){
    c.innerHTML=`
      <div class="card">
        <div class="card-head">حضور وغياب الموظفين اليوم</div>
        <div class="card-body">
          ${EMPS.length?EMPS.map((e,i)=>`
          <div class="emp-row ${e.present?'P':''}" id="er${i}">
            <div class="ei">
              <div class="av">${e.name?.substring(0,2)||'م'}</div>
              <div><div class="en">${e.name}</div><div class="er">${e.role}</div></div>
            </div>
            <div class="atg">
              <div class="ab ${e.present?'P':''}" onclick="setAtt(${i},true)">حاضر</div>
              <div class="ab ${!e.present?'A':''}" onclick="setAtt(${i},false)">غائب</div>
            </div>
          </div>`).join(''):'<div style="text-align:center;font-size:12px;color:var(--text3);padding:14px">لا يوجد موظفين مضافين</div>'}
          <div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:9px;font-size:12px">
            <span style="color:var(--text2)">الحاضرين اليوم</span>
            <span style="font-weight:700;color:#6EE7B7" id="pc">${EMPS.filter(e=>e.present).length} من ${EMPS.length}</span>
          </div>
        </div>
      </div>`;
  } else if(step===2){
    c.innerHTML=`
      <div class="card" style="margin-bottom:10px">
        <div class="card-head">إيرادات اليوم <span style="font-size:10px;color:var(--text3)">(من الـ POS تلقائي)</span></div>
        <div class="card-body">
          <div class="kards">
            <div class="kard k-cash"><div class="kl">نقدي</div><div class="kv">${fmt(DATA.cash)}</div></div>
            <div class="kard k-elec"><div class="kl">دفع إلكتروني</div><div class="kv">${fmt(DATA.elec)}</div></div>
          </div>
        </div>
      </div>
      <div class="card" style="margin-bottom:10px">
        <div class="card-head">مصاريف اليوم</div>
        <div class="card-body">
          ${DATA.dailyExps.length?DATA.dailyExps.map(e=>`<div class="exp-row"><span style="color:var(--text2)">${e.cat||e.name||'—'}</span><span style="font-weight:700;color:#FCA5A5">${fmt(e.amt)}</span></div>`).join(''):'<div style="text-align:center;font-size:12px;color:var(--text3)">لا يوجد مصاريف اليوم</div>'}
          <div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:9px;font-size:12px">
            <span style="color:#FCA5A5">إجمالي المصاريف</span>
            <span style="font-weight:700;color:#FCA5A5">${fmt(totExp())}</span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-head">الصافي والمبلغ الفعلي</div>
        <div class="card-body">
          <div class="kards">
            <div class="kard k-exp"><div class="kl">إجمالي المصاريف</div><div class="kv">${fmt(totExp())}</div></div>
            <div class="kard k-net"><div class="kl">الصافي</div><div class="kv">${fmt(netDay())}</div></div>
          </div>
          <div>
            <div class="fl">المبلغ الفعلي في إيدك دلوقتي</div>
            <input class="ainp" id="ainp" type="text" inputmode="decimal" placeholder="${netDay().toFixed(2)}" value="${actual}">
            <div class="hint">اكتب المبلغ الموجود فعلاً معاك</div>
          </div>
        </div>
      </div>`;
  } else if(step===3){
    c.innerHTML=`
      <div class="card">
        <div class="card-head">مراجعة نهائية</div>
        <div class="card-body">
          <div class="kards">
            <div class="kard k-cash"><div class="kl">نقدي</div><div class="kv">${fmt(DATA.cash)}</div></div>
            <div class="kard k-elec"><div class="kl">دفع إلكتروني</div><div class="kv">${fmt(DATA.elec)}</div></div>
            <div class="kard k-exp"><div class="kl">مصاريف</div><div class="kv">${fmt(totExp())}</div></div>
            <div class="kard k-net"><div class="kl">الصافي</div><div class="kv">${fmt(netDay())}</div></div>
          </div>
          ${actual?`<div class="kard k-actual" style="text-align:center;padding:10px;border-radius:10px"><div class="kl">المبلغ الفعلي</div><div class="kv">${fmt(actual)}</div></div>`:''}
          <div>
            <div class="fl">الحاضرين</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap">
              ${EMPS.filter(e=>e.present).map(e=>`<span style="padding:3px 9px;background:var(--green-bg);border-radius:20px;font-size:10px;font-weight:600;color:#6EE7B7">${e.name}</span>`).join('')}
              ${EMPS.filter(e=>!e.present).map(e=>`<span style="padding:3px 9px;background:var(--bg3);border-radius:20px;font-size:10px;color:var(--text3)">${e.name} (غائب)</span>`).join('')}
            </div>
          </div>
          <div>
            <div class="fl">ملاحظة (اختياري)</div>
            <textarea class="finp" id="note-inp" placeholder="أي ملاحظة على اليوم..." style="height:50px;resize:none" oninput="note=this.value">${note}</textarea>
          </div>
          <div class="warn-box">بعد الحفظ: يوم شغل هيتضاف تلقائي للحاضرين — واليوم هيتسجل في التقارير</div>
        </div>
      </div>`;
  }
}

function nav(){
  document.getElementById('nb').innerHTML=step>1?`<button style="padding:8px 18px;border:0.5px solid var(--border);border-radius:9px;font-size:12px;cursor:pointer;background:var(--bg3);color:var(--text2);font-family:'Cairo',sans-serif" onclick="go(${step-1})">رجوع</button>`:'';
  document.getElementById('nn').innerHTML=step<3
    ?`<button style="padding:8px 22px;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;font-family:'Cairo',sans-serif" onclick="nxt()">التالي</button>`
    :`<button style="padding:8px 22px;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;background:var(--green);color:#fff;font-family:'Cairo',sans-serif" onclick="saveDay()">حفظ وإغلاق اليوم</button>`;
}

window.setAtt=function(i,v){
  EMPS[i].present=v;
  document.getElementById('er'+i).className='emp-row '+(v?'P':'');
  document.querySelectorAll(`#er${i} .ab`).forEach((b,j)=>{b.className='ab '+(j===0&&v?'P':j===1&&!v?'A':'');});
  const pc=document.getElementById('pc');if(pc)pc.textContent=`${EMPS.filter(e=>e.present).length} من ${EMPS.length}`;
};

window.nxt=function(){
  if(step===2){const inp=document.getElementById('ainp');if(inp)actual=inp.value;}
  go(step+1);
}

window.saveDay=async function(){
  const nt=document.querySelector('#note-inp');if(nt)note=nt.value;
  // Add attendance day to present employees
  for(const emp of EMPS.filter(e=>e.present)){
    try{
      await updateDoc(doc(db,'employees',emp.id),{days:(emp.days||0)+1});
    }catch(e){}
  }
  // Save daily closing record
  try{
    await addDoc(collection(db,'daily_closing'),{
      date:dateStr(),dayKey:todayKey(),monthKey:monthKey(),
      cash:DATA.cash,elec:DATA.elec,
      totalIncome:totIncome(),totalExp:totExp(),
      netDay:netDay(),actual:parseFloat(actual||0),
      presentEmps:EMPS.filter(e=>e.present).map(e=>e.name),
      note,timestamp:serverTimestamp()
    });
    logTransaction('حفظ تقفيل اليوم',`صافي: ${fmt(netDay())}`,'close');
  }catch(e){}

  // Show done screen
  document.getElementById('sc').innerHTML=`
    <div style="text-align:center;padding:24px 16px">
      <div class="done-ic">✓</div>
      <div style="font-size:16px;font-weight:700;color:var(--text1);margin-bottom:5px">تم تقفيل اليوم بنجاح</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:16px">${dateStr()}</div>
      <div class="kards" style="margin-bottom:12px">
        <div class="kard k-cash"><div class="kl">نقدي</div><div class="kv">${fmt(DATA.cash)}</div></div>
        <div class="kard k-elec"><div class="kl">دفع إلكتروني</div><div class="kv">${fmt(DATA.elec)}</div></div>
        <div class="kard k-exp"><div class="kl">مصاريف</div><div class="kv">${fmt(totExp())}</div></div>
        <div class="kard k-net"><div class="kl">الصافي</div><div class="kv">${fmt(netDay())}</div></div>
      </div>
      <div style="font-size:11px;background:var(--green-bg);color:#6EE7B7;padding:8px 12px;border-radius:9px;border:0.5px solid var(--green)">
        تم إضافة يوم شغل لـ: ${EMPS.filter(e=>e.present).map(e=>e.name).join(' — ')||'لا يوجد'}
      </div>
    </div>`;
  document.getElementById('nb').innerHTML='';
  document.getElementById('nn').innerHTML='';
  [1,2,3].forEach(i=>document.getElementById('st'+i).className='stp done');
  [1,2].forEach(i=>document.getElementById('ln'+i).className='stline done');
};

requireAuth(async(user,userData)=>{
  isAdm=user.uid===ADMIN_UID;
  document.getElementById('uname').textContent=isAdm?'Admin':(userData?.name||user.email);
  await loadData();
  go(1);
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — المخزن</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:900px;margin:0 auto;padding:20px 16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.cats-filter{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.cf{padding:5px 12px;border:0.5px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--bg2);color:var(--text2);transition:all .12s}
.cf.act{background:#1E3A8A;color:#fff;border-color:var(--accent)}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.cb-s{background:#064E3B;color:#6EE7B7}
.cb-b{background:#1E3A8A;color:#93C5FD}
.cb-f{background:#451A03;color:#FCD34D}
.cb-h{background:#2E1065;color:#C4B5FD}
.cb-d{background:#450A0A;color:#FCA5A5}
.cb-o{background:var(--bg3);color:var(--text2)}
.unlim-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;background:#064E3B;border:0.5px solid var(--green);color:#6EE7B7}
.warn-row td{background:#450A0A!important}
.warn-row td .qty-val{color:#FCA5A5!important;font-weight:700}
.qty-val{font-weight:700;color:var(--text1)}
.qty-unit{font-size:10px;color:var(--text3);margin-right:2px}
.act-btns{display:flex;gap:4px}
.btn-add-qty{padding:3px 8px;background:var(--green-bg);border:0.5px solid var(--green);border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;color:#6EE7B7;font-family:'Cairo',sans-serif}
.btn-sub-qty{padding:3px 8px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;color:#FCA5A5;font-family:'Cairo',sans-serif}
.btn-edit-item{padding:3px 8px;background:var(--bg3);border:0.5px solid var(--border);border-radius:7px;font-size:10px;cursor:pointer;color:var(--text2);font-family:'Cairo',sans-serif}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.topt{padding:9px;border:0.5px solid var(--border);border-radius:9px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;background:var(--bg3);color:var(--text2);transition:all .12s}
.topt.act-count{background:#1E3A8A;border-color:var(--accent);color:#93C5FD}
.topt.act-unlim{background:#064E3B;border-color:var(--green);color:#6EE7B7}
.unlim-note{padding:9px 12px;background:var(--green-bg);border:0.5px solid var(--green);border-radius:9px;font-size:11px;color:#6EE7B7}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex">
    <div class="logo">C</div>
    <div class="app-name">المخزن</div>
  </div>
  <div class="tb-flex">
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <button class="btn-primary" id="add-btn" onclick="openAddItem()" style="display:none">+ إضافة صنف</button>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div id="notif-area"></div>
  <div class="cats-filter" id="cats-filter"></div>

  <div class="sec-title">أصناف محسوبة بالكمية <span class="badge badge-blue" style="font-size:10px" id="counted-count">0</span></div>
  <div class="tbl-wrap" style="margin-bottom:16px">
    <table class="dtbl">
      <thead><tr>
        <th style="width:130px">الصنف</th>
        <th style="width:80px">التصنيف</th>
        <th style="width:90px">الكمية</th>
        <th style="width:80px">حد التنبيه</th>
        <th style="width:80px">آخر تحديث</th>
        <th style="width:120px">أكشن</th>
      </tr></thead>
      <tbody id="counted-body"></tbody>
    </table>
  </div>

  <div class="sec-title">أصناف كمية غير محددة <span class="badge badge-green" style="font-size:10px" id="unlim-count">0</span></div>
  <div class="tbl-wrap">
    <table class="dtbl">
      <thead><tr>
        <th style="width:160px">الصنف</th>
        <th style="width:80px">التصنيف</th>
        <th style="width:130px">الحالة</th>
        <th style="width:70px">أكشن</th>
      </tr></thead>
      <tbody id="unlim-body"></tbody>
    </table>
  </div>
</div>

<!-- Popup -->
<div id="ovl" style="display:none" class="ovl" onclick="if(event.target===this)closeOvl()">
  <div class="pop" id="pop"></div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, hasPermission, logTransaction, fmt,
  collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from './firebase.js';

const CAT_COLORS = {'ساخن':'cb-s','بارد':'cb-b','فريش':'cb-f','أعشاب':'cb-h','ديزرت':'cb-d','أخرى':'cb-o','بلايستيشن':'cb-b','بلياردو':'cb-h','بينج بونج':'cb-s'};
const nowT = () => new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const dateStr = () => new Date().toLocaleDateString('ar-EG');

let ITEMS=[], CATS=[], selCat='الكل', isAdm=false, canUpdate=false, canAdd=false, canDel=false;

async function loadItems(){
  try{
    const snap = await getDocs(collection(db,'inventory'));
    ITEMS=[];
    snap.forEach(d=>ITEMS.push({id:d.id,...d.data()}));
    CATS=['الكل',...new Set(ITEMS.map(i=>i.cat).filter(Boolean))];
  }catch(e){ ITEMS=[]; CATS=['الكل']; }
}

function renderCats(){
  const g=document.getElementById('cats-filter'); g.innerHTML='';
  CATS.forEach(c=>{
    const d=document.createElement('div');
    d.className='cf'+(selCat===c?' act':'');
    const cnt=c==='الكل'?ITEMS.length:ITEMS.filter(i=>i.cat===c).length;
    d.textContent=`${c} (${cnt})`;
    d.onclick=()=>{selCat=c;renderTables();renderCats();};
    g.appendChild(d);
  });
}

function renderTables(){
  const filtered=selCat==='الكل'?ITEMS:ITEMS.filter(i=>i.cat===selCat);
  const counted=filtered.filter(i=>i.type==='counted');
  const unlim=filtered.filter(i=>i.type==='unlimited');

  // Notifications
  const low=ITEMS.filter(i=>i.type==='counted'&&i.qty<=i.alertQty);
  const na=document.getElementById('notif-area');
  na.innerHTML=low.length?`<div class="notif-bar"><div class="notif-dot"></div><span>تنبيه: ${low.map(i=>i.name).join('، ')} — على وشك الانتهاء</span></div>`:'';

  document.getElementById('counted-count').textContent=counted.length;
  document.getElementById('unlim-count').textContent=unlim.length;

  // Counted table
  const cb=document.getElementById('counted-body');
  cb.innerHTML=counted.length?counted.map(i=>`
    <tr class="${i.qty<=i.alertQty?'warn-row':''}">
      <td style="font-weight:600">${i.name}${i.qty<=i.alertQty?' ⚠':''}</td>
      <td><span class="cat-badge ${CAT_COLORS[i.cat]||'cb-o'}">${i.cat}</span></td>
      <td><span class="qty-val">${i.qty}</span><span class="qty-unit">${i.unit}</span></td>
      <td style="color:var(--text3)">${i.alertQty} ${i.unit}</td>
      <td style="font-size:10px;color:var(--text3)">${i.updatedAt||'—'}</td>
      <td><div class="act-btns">
        ${canUpdate?`<div class="btn-add-qty" onclick="openUpdate('${i.id}','add')">+ إضافة</div><div class="btn-sub-qty" onclick="openUpdate('${i.id}','sub')">− سحب</div>`:''}
        ${canAdd?`<div class="btn-edit-item" onclick="openEdit('${i.id}')">تعديل</div>`:''}
      </div></td>
    </tr>`).join('')
  :'<tr><td colspan="6" style="text-align:center;padding:14px;color:var(--text3)">لا يوجد أصناف</td></tr>';

  // Unlimited table
  const ub=document.getElementById('unlim-body');
  ub.innerHTML=unlim.length?unlim.map(i=>`
    <tr>
      <td style="font-weight:600">${i.name}</td>
      <td><span class="cat-badge ${CAT_COLORS[i.cat]||'cb-o'}">${i.cat}</span></td>
      <td><span class="unlim-badge">كمية غير محددة</span></td>
      <td>${canAdd?`<div class="btn-edit-item" onclick="openEdit('${i.id}')">تعديل</div>`:'—'}</td>
    </tr>`).join('')
  :'<tr><td colspan="4" style="text-align:center;padding:14px;color:var(--text3)">لا يوجد أصناف</td></tr>';
}

window.openUpdate=function(id,type){
  const it=ITEMS.find(x=>x.id===id);
  if(!it)return;
  const isAdd=type==='add';
  const pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>${isAdd?'إضافة كمية':'سحب كمية'} — ${it.name}</span></div>
    <div class="pop-body">
      <div style="display:flex;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:9px;font-size:12px">
        <span style="color:var(--text2)">الكمية الحالية</span>
        <span style="font-weight:700;font-size:14px">${it.qty} ${it.unit}</span>
      </div>
      <div>
        <div class="fl">${isAdd?'الكمية اللي هتضيفها':'الكمية اللي هتسحبها'} (${it.unit})</div>
        <input class="finp" id="upd-qty" type="text" inputmode="decimal" placeholder="0" style="font-size:22px;font-weight:700;text-align:center;direction:ltr" oninput="previewQty('${id}','${type}',this.value)">
      </div>
      <div id="preview-row" style="display:none;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:9px;font-size:12px">
        <span style="color:var(--text2)">الكمية بعد ${isAdd?'الإضافة':'السحب'}</span>
        <span style="font-weight:700;font-size:14px" id="preview-val"></span>
      </div>
      <div id="warn-low" style="display:none;padding:8px 10px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:9px;font-size:11px;color:#FCA5A5">الكمية ستصل لحد التنبيه أو أقل</div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إلغاء</div>
      <div class="btn-confirm" style="background:${isAdd?'var(--green)':'var(--red)'}" onclick="doUpdate('${id}','${type}')">${isAdd?'إضافة':'سحب'}</div>
    </div>`;
  document.getElementById('ovl').style.display='flex';
};

window.previewQty=function(id,type,v){
  const it=ITEMS.find(x=>x.id===id);
  const val=parseFloat(v.replace(',','.')||0);
  const newQ=type==='add'?it.qty+val:it.qty-val;
  const pr=document.getElementById('preview-row');
  const pv=document.getElementById('preview-val');
  const wl=document.getElementById('warn-low');
  if(!val){pr.style.display='none';if(wl)wl.style.display='none';return;}
  pr.style.display='flex';
  pv.textContent=`${Math.max(0,parseFloat(newQ.toFixed(3)))} ${it.unit}`;
  pv.style.color=newQ<=0?'#FCA5A5':newQ<=it.alertQty?'#FCD34D':'#6EE7B7';
  if(wl)wl.style.display=newQ<=it.alertQty&&newQ>0?'block':'none';
};

window.doUpdate=async function(id,type){
  const it=ITEMS.find(x=>x.id===id);
  const val=parseFloat(document.getElementById('upd-qty')?.value?.replace(',','.')||0);
  if(!val||val<=0)return alert('اكتب كمية صح');
  if(type==='sub'&&val>it.qty)return alert('الكمية المسحوبة أكبر من المتاح');
  if(type==='add')it.qty=parseFloat((it.qty+val).toFixed(4));
  else it.qty=parseFloat((it.qty-val).toFixed(4));
  it.updatedAt=`${dateStr()} ${nowT()}`;
  try{
    await updateDoc(doc(db,'inventory',id),{qty:it.qty,updatedAt:it.updatedAt});
    logTransaction(`${type==='add'?'إضافة':'سحب'} ${val} ${it.unit} من ${it.name}`,'','inv');
  }catch(e){}
  closeOvl(); renderTables(); renderCats();
};

window.openEdit=function(id){
  const it=ITEMS.find(x=>x.id===id);
  if(!it)return;
  const pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>تعديل — ${it.name}</span></div>
    <div class="pop-body">
      <div><div class="fl">اسم الصنف</div><input class="finp" id="e-name" value="${it.name}" style="width:100%"></div>
      <div><div class="fl">التصنيف</div><input class="finp" id="e-cat" value="${it.cat}" style="width:100%"></div>
      ${it.type==='counted'?`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><div class="fl">حد التنبيه</div><input class="finp" id="e-alert" type="text" inputmode="decimal" value="${it.alertQty}"></div>
        <div><div class="fl">وحدة القياس</div>
          <select class="fsel" id="e-unit">
            ${['عدد','جرام','كيلو','لتر','ملليلتر'].map(u=>`<option ${u===it.unit?'selected':''}>${u}</option>`).join('')}
          </select>
        </div>
      </div>`:''}
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إلغاء</div>
      <div class="btn-confirm" onclick="doEdit('${id}')">حفظ</div>
    </div>`;
  document.getElementById('ovl').style.display='flex';
};

window.doEdit=async function(id){
  const it=ITEMS.find(x=>x.id===id);
  it.name=document.getElementById('e-name').value.trim()||it.name;
  it.cat=document.getElementById('e-cat').value.trim()||it.cat;
  if(it.type==='counted'){
    it.alertQty=parseFloat(document.getElementById('e-alert')?.value||it.alertQty);
    it.unit=document.getElementById('e-unit')?.value||it.unit;
  }
  try{
    await updateDoc(doc(db,'inventory',id),{name:it.name,cat:it.cat,alertQty:it.alertQty||0,unit:it.unit||'عدد'});
    logTransaction(`تعديل صنف مخزن: ${it.name}`,'','inv');
  }catch(e){}
  closeOvl(); renderTables(); renderCats();
};

window.openAddItem=function(){
  let itemType='counted';
  const pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>إضافة صنف جديد</span></div>
    <div class="pop-body">
      <div>
        <div class="fl">نوع الصنف</div>
        <div class="type-toggle">
          <div class="topt act-count" id="topt-count" onclick="setItemType('counted')">محسوب بالكمية</div>
          <div class="topt" id="topt-unlim" onclick="setItemType('unlimited')">كمية غير محددة</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><div class="fl">اسم الصنف</div><input class="finp" id="n-name" placeholder="مثلاً: بيبسي"></div>
        <div><div class="fl">التصنيف</div><input class="finp" id="n-cat" placeholder="مثلاً: بارد"></div>
      </div>
      <div id="counted-fields" style="display:flex;flex-direction:column;gap:8px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><div class="fl">الكمية الابتدائية</div><input class="finp" id="n-qty" type="text" inputmode="decimal" placeholder="0"></div>
          <div><div class="fl">وحدة القياس</div>
            <select class="fsel" id="n-unit">
              <option>عدد</option><option>جرام</option><option>كيلو</option><option>لتر</option><option>ملليلتر</option>
            </select>
          </div>
        </div>
        <div><div class="fl">حد التنبيه</div><input class="finp" id="n-alert" type="text" inputmode="decimal" placeholder="مثلاً: 10"><div style="font-size:10px;color:var(--text3);margin-top:3px">لما الكمية توصل لهذا الحد هيظهر تنبيه</div></div>
      </div>
      <div id="unlim-fields" style="display:none">
        <div class="unlim-note">الصنف ده مش هيتحسبله كمية ومش هيبعت تنبيه</div>
      </div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إلغاء</div>
      <div class="btn-confirm" onclick="doAddItem()">إضافة</div>
    </div>`;
  document.getElementById('ovl').style.display='flex';

  window.setItemType=function(t){
    itemType=t;
    document.getElementById('topt-count').className='topt'+(t==='counted'?' act-count':'');
    document.getElementById('topt-unlim').className='topt'+(t==='unlimited'?' act-unlim':'');
    document.getElementById('counted-fields').style.display=t==='counted'?'flex':'none';
    document.getElementById('unlim-fields').style.display=t==='unlimited'?'block':'none';
  };

  window.doAddItem=async function(){
    const name=document.getElementById('n-name').value.trim();
    const cat=document.getElementById('n-cat').value.trim();
    if(!name)return alert('اكتب اسم الصنف');
    if(!cat)return alert('اكتب التصنيف');
    const data={name,cat,type:itemType,updatedAt:`${dateStr()} ${nowT()}`,timestamp:serverTimestamp()};
    if(itemType==='counted'){
      data.qty=parseFloat(document.getElementById('n-qty').value||0);
      data.unit=document.getElementById('n-unit').value;
      data.alertQty=parseFloat(document.getElementById('n-alert').value||0);
    }
    try{
      const ref=await addDoc(collection(db,'inventory'),data);
      ITEMS.push({id:ref.id,...data});
      if(!CATS.includes(cat)){CATS.push(cat);}
      logTransaction(`إضافة صنف مخزن: ${name}`,cat,'inv');
      closeOvl(); renderTables(); renderCats();
    }catch(e){alert('حصل خطأ');}
  };
};

window.closeOvl=function(){document.getElementById('ovl').style.display='none';};

requireAuth(async(user,userData)=>{
  isAdm=user.uid===ADMIN_UID;
  canUpdate=isAdm||await hasPermission('update_qty');
  canAdd=isAdm||await hasPermission('add_inv');
  canDel=isAdm||await hasPermission('del_inv');
  document.getElementById('uname').textContent=isAdm?'Admin':(userData?.name||user.email);
  if(canAdd)document.getElementById('add-btn').style.display='block';
  await loadItems();
  renderTables();
  renderCats();
});
</script>
</body>
</html>

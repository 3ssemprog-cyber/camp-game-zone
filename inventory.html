<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — المخزن</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:960px;margin:0 auto;padding:20px 16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.cf{padding:5px 12px;border:0.5px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--bg2);color:var(--text2)}
.cf.act{background:#1E3A8A;color:#fff;border-color:var(--accent)}
.inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:700px){.inv-grid{grid-template-columns:repeat(2,1fr)}}
.icard{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden}
.icard.low{border-color:var(--red)}
.icard.unlimited{border-style:dashed}
.ic-head{padding:10px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px}
.ic-name{font-size:13px;font-weight:700;color:var(--text1);flex:1}
.ic-cat{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:600;background:var(--bg3);color:var(--text2);white-space:nowrap}
.ic-body{padding:10px 12px;display:flex;flex-direction:column;gap:7px}
.qty-big{text-align:center;padding:10px;background:var(--bg3);border-radius:10px}
.qty-num{font-size:28px;font-weight:700;color:var(--text1)}
.qty-num.low{color:#FCA5A5}
.qty-unit{font-size:11px;color:var(--text3);margin-top:2px}
.qty-unlim{font-size:14px;font-weight:600;color:#6EE7B7;text-align:center;padding:10px;background:var(--green-bg);border-radius:10px;border:0.5px solid var(--green)}
.ic-row{display:flex;justify-content:space-between;font-size:11px}
.ic-lbl{color:var(--text3)}
.ic-val{font-weight:600;color:var(--text1)}
.sale-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.sale-yes{background:var(--green-bg);color:#6EE7B7;border:0.5px solid var(--green)}
.sale-no{background:var(--bg3);color:var(--text3)}
.ic-foot{padding:8px 12px;border-top:0.5px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.ic-btn{padding:5px;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;text-align:center;font-family:'Cairo',sans-serif;border:0.5px solid}
.btn-add-q{background:var(--green-bg);border-color:var(--green);color:#6EE7B7}
.btn-sub-q{background:var(--red-bg);border-color:var(--red);color:#FCA5A5}
.btn-edit-i{background:var(--bg3);border-color:var(--border);color:var(--text2)}
.btn-del-i{background:var(--red-bg);border-color:var(--red);color:#FCA5A5;grid-column:1/-1}
.low-bar{padding:7px 10px;background:#450A0A;border:0.5px solid var(--red);border-radius:9px;font-size:11px;color:#FCA5A5;display:flex;align-items:center;gap:6px;margin-bottom:10px}
.low-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.empty-state{grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex"><div class="logo">C</div><div class="app-name">المخزن</div></div>
  <div class="tb-flex">
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <button class="btn-primary" id="add-btn" onclick="openAdd()" style="display:none">+ إضافة صنف</button>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div id="low-bar" style="display:none" class="low-bar">
    <div class="low-dot"></div>
    <span id="low-text"></span>
  </div>
  <div class="filters" id="cats-filter"></div>
  <div class="inv-grid" id="inv-grid"></div>
</div>

<!-- Popup -->
<div id="ovl" style="display:none" class="ovl" onclick="if(event.target===this)closeOvl()">
  <div class="pop" id="pop"></div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, hasPermission, logTransaction, fmt,
  collection, getDocs, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from './firebase.js';

const nowT=()=>new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const dateStr=()=>new Date().toLocaleDateString('ar-EG');

let ITEMS=[], CATS=[], selCat='الكل', isAdm=false, canAdd=false, canDel=false, canUpdate=false, canSub=false;

// ===== LOAD =====
async function loadItems(){
  try{
    const snap=await getDocs(collection(db,'inventory'));
    ITEMS=[];
    snap.forEach(d=>ITEMS.push({id:d.id,...d.data()}));
    const catSet=new Set(ITEMS.map(i=>i.cat).filter(Boolean));
    CATS=['الكل',...catSet];
  }catch(e){ITEMS=[];CATS=['الكل'];}
}

// ===== RENDER =====
function renderFilters(){
  const g=document.getElementById('cats-filter');
  g.innerHTML=CATS.map(c=>{
    const cnt=c==='الكل'?ITEMS.length:ITEMS.filter(i=>i.cat===c).length;
    return`<div class="cf${selCat===c?' act':''}" onclick="setCat('${c}')">${c} (${cnt})</div>`;
  }).join('');
}

function renderGrid(){
  const filtered=selCat==='الكل'?ITEMS:ITEMS.filter(i=>i.cat===selCat);
  const g=document.getElementById('inv-grid');

  // Low stock alert
  const low=ITEMS.filter(i=>i.qtyType==='limited'&&i.qty<=i.alertQty);
  const lb=document.getElementById('low-bar');
  if(low.length){lb.style.display='flex';document.getElementById('low-text').textContent=`تنبيه: ${low.map(i=>i.name).join('، ')} — على وشك الانتهاء`;}
  else lb.style.display='none';

  if(!filtered.length){
    g.innerHTML='<div class="empty-state">لا يوجد أصناف — اضغط إضافة صنف</div>';
    return;
  }

  g.innerHTML=filtered.map(it=>{
    const isLow=it.qtyType==='limited'&&it.qty<=it.alertQty;
    const isUnlim=it.qtyType==='unlimited';
    return`<div class="icard${isLow?' low':''}${isUnlim?' unlimited':''}">
      <div class="ic-head">
        <span class="ic-name">${it.name}</span>
        <span class="ic-cat">${it.cat||'—'}</span>
      </div>
      <div class="ic-body">
        ${isUnlim
          ?`<div class="qty-unlim">∞ كمية غير محدودة</div>`
          :`<div class="qty-big">
              <div class="qty-num${isLow?' low':''}">${it.qty??0}</div>
              <div class="qty-unit">${it.unit||'عدد'}</div>
              ${isLow?`<div style="font-size:10px;color:#FCA5A5;margin-top:3px">⚠ وصل للحد (${it.alertQty})</div>`:''}
            </div>`}
        <div class="ic-row">
          <span class="ic-lbl">سعر البيع</span>
          <span class="ic-val" style="color:#6EE7B7">${it.forSale?fmt(it.salePrice):'—'}</span>
        </div>
        <div class="ic-row">
          <span class="ic-lbl">للبيع في المنيو</span>
          <span class="sale-badge ${it.forSale?'sale-yes':'sale-no'}">${it.forSale?'✓ نعم':'لا'}</span>
        </div>
      </div>
      <div class="ic-foot">
        ${!isUnlim&&canUpdate?`<div class="ic-btn btn-add-q" onclick="openUpdate('${it.id}','add')">+ إضافة</div>`:''}
        ${!isUnlim&&canSub?`<div class="ic-btn btn-sub-q" onclick="openUpdate('${it.id}','sub')">− سحب</div>`:''}
        ${canAdd?`<div class="ic-btn btn-edit-i" onclick="openEdit('${it.id}')">تعديل</div>`:''}
        ${canDel?`<div class="ic-btn btn-del-i" onclick="delItem('${it.id}')">حذف الصنف</div>`:''}
      </div>
    </div>`;
  }).join('');
}

window.setCat=function(c){selCat=c;renderFilters();renderGrid();};

// ===== ADD =====
window.openAdd=function(){
  const pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>إضافة صنف جديد</span></div>
    <div class="pop-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><div class="fl">اسم الصنف</div><input class="finp" id="n-name" placeholder="مثلاً: بيبسي" style="width:100%"></div>
        <div><div class="fl">التصنيف</div><input class="finp" id="n-cat" placeholder="مثلاً: مشاريب" style="width:100%"></div>
      </div>
      <div>
        <div class="fl">نوع الكمية</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div id="qt-lim" onclick="setQType('limited')" style="padding:9px;border:0.5px solid var(--accent);border-radius:9px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;background:#1E3A8A;color:#93C5FD">محدودة بالعدد</div>
          <div id="qt-unl" onclick="setQType('unlimited')" style="padding:9px;border:0.5px solid var(--border);border-radius:9px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--text2)">غير محدودة</div>
        </div>
      </div>
      <div id="limited-fields" style="display:flex;flex-direction:column;gap:8px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          <div><div class="fl">الكمية</div><input class="finp" id="n-qty" type="text" inputmode="decimal" placeholder="0"></div>
          <div><div class="fl">وحدة القياس</div>
            <select class="fsel" id="n-unit">
              <option>عدد</option><option>جرام</option><option>كيلو</option><option>لتر</option><option>ملليلتر</option>
            </select>
          </div>
          <div><div class="fl">حد التنبيه</div><input class="finp" id="n-alert" type="text" inputmode="decimal" placeholder="5"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div>
          <div class="fl">للبيع في المنيو؟</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
            <div id="fs-yes" onclick="setForSale(true)" style="padding:7px;border:0.5px solid var(--border);border-radius:9px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--text2)">نعم</div>
            <div id="fs-no" onclick="setForSale(false)" style="padding:7px;border:0.5px solid var(--accent);border-radius:9px;text-align:center;font-size:11px;font-weight:600;cursor:pointer;background:#1E3A8A;color:#93C5FD">لا</div>
          </div>
        </div>
        <div id="sale-price-field" style="display:none">
          <div class="fl">سعر البيع (ج)</div>
          <input class="finp" id="n-price" type="text" inputmode="decimal" placeholder="0" style="width:100%">
        </div>
      </div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إلغاء</div>
      <div class="btn-confirm" onclick="doAdd()">إضافة</div>
    </div>`;
  document.getElementById('ovl').style.display='flex';

  let qType='limited', forSale=false;
  window.setQType=function(t){
    qType=t;
    document.getElementById('qt-lim').style.background=t==='limited'?'#1E3A8A':'var(--bg3)';
    document.getElementById('qt-lim').style.color=t==='limited'?'#93C5FD':'var(--text2)';
    document.getElementById('qt-lim').style.borderColor=t==='limited'?'var(--accent)':'var(--border)';
    document.getElementById('qt-unl').style.background=t==='unlimited'?'#064E3B':'var(--bg3)';
    document.getElementById('qt-unl').style.color=t==='unlimited'?'#6EE7B7':'var(--text2)';
    document.getElementById('qt-unl').style.borderColor=t==='unlimited'?'var(--green)':'var(--border)';
    document.getElementById('limited-fields').style.display=t==='limited'?'flex':'none';
  };
  window.setForSale=function(v){
    forSale=v;
    document.getElementById('fs-yes').style.background=v?'#064E3B':'var(--bg3)';
    document.getElementById('fs-yes').style.color=v?'#6EE7B7':'var(--text2)';
    document.getElementById('fs-yes').style.borderColor=v?'var(--green)':'var(--border)';
    document.getElementById('fs-no').style.background=!v?'#1E3A8A':'var(--bg3)';
    document.getElementById('fs-no').style.color=!v?'#93C5FD':'var(--text2)';
    document.getElementById('fs-no').style.borderColor=!v?'var(--accent)':'var(--border)';
    document.getElementById('sale-price-field').style.display=v?'block':'none';
  };
  window.doAdd=async function(){
    const name=document.getElementById('n-name').value.trim();
    const cat=document.getElementById('n-cat').value.trim();
    if(!name||!cat)return alert('اكتب الاسم والتصنيف');
    const data={name,cat,qtyType:qType,forSale,timestamp:serverTimestamp(),updatedAt:dateStr()+' '+nowT()};
    if(qType==='limited'){
      data.qty=parseFloat(document.getElementById('n-qty').value||0);
      data.unit=document.getElementById('n-unit').value;
      data.alertQty=parseFloat(document.getElementById('n-alert').value||0);
    }
    if(forSale){
      const sp=parseFloat(document.getElementById('n-price')?.value||0);
      if(!sp||sp<=0)return alert('اكتب سعر البيع');
      data.salePrice=sp;
    }
    try{
      const ref=await addDoc(collection(db,'inventory'),data);
      ITEMS.push({id:ref.id,...data});
      if(!CATS.includes(cat)){CATS.push(cat);}
      logTransaction(`إضافة صنف مخزن: ${name}`,cat,'inv');
      closeOvl();
    }catch(e){alert('حصل خطأ');}
  };
};

// ===== EDIT =====
window.openEdit=function(id){
  const it=ITEMS.find(x=>x.id===id);if(!it)return;
  const pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>تعديل — ${it.name}</span></div>
    <div class="pop-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><div class="fl">الاسم</div><input class="finp" id="e-name" value="${it.name}" style="width:100%"></div>
        <div><div class="fl">التصنيف</div><input class="finp" id="e-cat" value="${it.cat||''}" style="width:100%"></div>
      </div>
      ${it.qtyType==='limited'?`
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div><div class="fl">الكمية</div><input class="finp" id="e-qty" type="text" inputmode="decimal" value="${it.qty??0}"></div>
        <div><div class="fl">وحدة القياس</div>
          <select class="fsel" id="e-unit">
            ${['عدد','جرام','كيلو','لتر','ملليلتر'].map(u=>`<option${u===it.unit?' selected':''}>${u}</option>`).join('')}
          </select>
        </div>
        <div><div class="fl">حد التنبيه</div><input class="finp" id="e-alert" type="text" inputmode="decimal" value="${it.alertQty??0}"></div>
      </div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div><div class="fl">للبيع؟</div>
          <select class="fsel" id="e-forsale" onchange="document.getElementById('e-price-wrap').style.display=this.value==='true'?'block':'none'">
            <option value="true"${it.forSale?' selected':''}>نعم</option>
            <option value="false"${!it.forSale?' selected':''}>لا</option>
          </select>
        </div>
        <div id="e-price-wrap" style="display:${it.forSale?'block':'none'}">
          <div class="fl">سعر البيع (ج)</div>
          <input class="finp" id="e-price" type="text" inputmode="decimal" value="${it.salePrice||0}" style="width:100%">
        </div>
      </div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إلغاء</div>
      <div class="btn-confirm" onclick="doEdit('${id}')">حفظ</div>
    </div>`;
  document.getElementById('ovl').style.display='flex';
};

window.doEdit=async function(id){
  const it=ITEMS.find(x=>x.id===id);if(!it)return;
  it.name=document.getElementById('e-name').value.trim()||it.name;
  it.cat=document.getElementById('e-cat').value.trim()||it.cat;
  if(it.qtyType==='limited'){
    it.qty=parseFloat(document.getElementById('e-qty')?.value||it.qty);
    it.unit=document.getElementById('e-unit')?.value||it.unit;
    it.alertQty=parseFloat(document.getElementById('e-alert')?.value||it.alertQty);
  }
  it.forSale=document.getElementById('e-forsale').value==='true';
  if(it.forSale){
    it.salePrice=parseFloat(document.getElementById('e-price')?.value||0);
  }
  it.updatedAt=dateStr()+' '+nowT();
  try{
    await updateDoc(doc(db,'inventory',id),{
      name:it.name,cat:it.cat,qty:it.qty,unit:it.unit,alertQty:it.alertQty,
      forSale:it.forSale,salePrice:it.salePrice||0,updatedAt:it.updatedAt
    });
    logTransaction(`تعديل صنف: ${it.name}`,'','inv');
    closeOvl();
  }catch(e){alert('حصل خطأ');}
};

// ===== UPDATE QTY =====
window.openUpdate=function(id,type){
  const it=ITEMS.find(x=>x.id===id);if(!it)return;
  const isAdd=type==='add';
  const pop=document.getElementById('pop');
  pop.innerHTML=`
    <div class="pop-head"><span>${isAdd?'إضافة كمية':'سحب كمية'} — ${it.name}</span></div>
    <div class="pop-body">
      <div style="display:flex;justify-content:space-between;padding:9px 12px;background:var(--bg3);border-radius:9px">
        <span style="color:var(--text2)">الكمية الحالية</span>
        <span style="font-size:16px;font-weight:700">${it.qty} ${it.unit||'عدد'}</span>
      </div>
      <div>
        <div class="fl">${isAdd?'الكمية اللي هتضيفها':'الكمية اللي هتسحبها'}</div>
        <input class="finp" id="upd-qty" type="text" inputmode="decimal" placeholder="0"
          style="font-size:22px;font-weight:700;text-align:center;direction:ltr"
          oninput="previewQty('${id}','${type}',this.value)">
      </div>
      <div id="preview-row" style="display:none;justify-content:space-between;padding:9px 12px;background:var(--bg3);border-radius:9px">
        <span style="color:var(--text2)">بعد ${isAdd?'الإضافة':'السحب'}</span>
        <span id="preview-val" style="font-size:16px;font-weight:700"></span>
      </div>
    </div>
    <div class="pop-foot">
      <div class="btn-cancel" onclick="closeOvl()">إلغاء</div>
      <div class="btn-confirm" style="background:${isAdd?'var(--green)':'var(--red)'}" onclick="doUpdate('${id}','${type}')">
        ${isAdd?'إضافة':'سحب'}
      </div>
    </div>`;
  document.getElementById('ovl').style.display='flex';
};

window.previewQty=function(id,type,v){
  const it=ITEMS.find(x=>x.id===id);
  const val=parseFloat(v.replace(',','.')||0);
  const newQ=type==='add'?it.qty+val:it.qty-val;
  const pr=document.getElementById('preview-row');
  const pv=document.getElementById('preview-val');
  if(!val){pr.style.display='none';return;}
  pr.style.display='flex';
  pv.textContent=`${Math.max(0,parseFloat(newQ.toFixed(3)))} ${it.unit||'عدد'}`;
  pv.style.color=newQ<=0?'#FCA5A5':newQ<=it.alertQty?'#FCD34D':'#6EE7B7';
};

window.doUpdate=async function(id,type){
  const it=ITEMS.find(x=>x.id===id);
  const val=parseFloat(document.getElementById('upd-qty')?.value?.replace(',','.')||0);
  if(!val||val<=0)return alert('اكتب كمية صح');
  if(type==='sub'&&val>it.qty)return alert('الكمية المسحوبة أكبر من المتاح');
  if(type==='add')it.qty=parseFloat((it.qty+val).toFixed(3));
  else it.qty=parseFloat((it.qty-val).toFixed(3));
  it.updatedAt=dateStr()+' '+nowT();
  try{
    await updateDoc(doc(db,'inventory',id),{qty:it.qty,updatedAt:it.updatedAt});
    logTransaction(`${type==='add'?'إضافة':'سحب'} ${val} ${it.unit||'عدد'} من ${it.name}`,'','inv');
    closeOvl();
  }catch(e){alert('حصل خطأ');}
};

// ===== DELETE =====
window.delItem=async function(id){
  if(!confirm('هتحذف الصنف ده نهائياً؟'))return;
  try{
    await deleteDoc(doc(db,'inventory',id));
    ITEMS=ITEMS.filter(i=>i.id!==id);
    const catSet=new Set(ITEMS.map(i=>i.cat).filter(Boolean));
    CATS=['الكل',...catSet];
    logTransaction('حذف صنف مخزن','','inv');
    if(!ITEMS.filter(i=>selCat==='الكل'||i.cat===selCat).length)selCat='الكل';
    renderFilters();renderGrid();
  }catch(e){alert('حصل خطأ');}
};

// ===== DEDUCT FROM SALE (called from POS) =====
// This function is exported for POS to call when item is sold
window.deductInventory=async function(itemId,qty){
  const it=ITEMS.find(x=>x.id===itemId);
  if(!it||it.qtyType!=='limited'||!it.forSale)return;
  it.qty=Math.max(0,parseFloat((it.qty-qty).toFixed(3)));
  try{await updateDoc(doc(db,'inventory',itemId),{qty:it.qty});}catch(e){}
};

window.closeOvl=function(){
  document.getElementById('ovl').style.display='none';
  renderFilters();renderGrid();
};

requireAuth(async(user,userData)=>{
  isAdm=user.uid===ADMIN_UID;
  const p=userData?.permissions||{};
  canAdd=isAdm||p['inv.add']===true;
  canDel=isAdm||p['inv.del']===true;
  canUpdate=isAdm||p['inv.update_qty']===true;
  canSub=isAdm||p['inv.sub_qty']===true;
  document.getElementById('uname').textContent=isAdm?'Admin':(userData?.name||user.email);
  if(canAdd)document.getElementById('add-btn').style.display='block';
  await loadItems();
  renderFilters();renderGrid();
});
</script>
</body>
</html>

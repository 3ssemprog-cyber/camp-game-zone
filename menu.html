<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Camp Game Zone — المنيو</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0B1120;--bg2:#131D2E;--bg3:#1A2640;
  --border:#1E3050;--text1:#F0F6FF;--text2:#7A9CC0;--text3:#3D5878;
  --accent:#3B82F6;--green:#10B981;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;direction:rtl}

/* Header */
.hdr{background:var(--bg2);border-bottom:0.5px solid var(--border);padding:10px 14px;position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-right{display:flex;align-items:center;gap:7px;min-width:0;flex:1}
.logo{width:32px;height:32px;background:#1E3A8A;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
.pg-title{font-size:13px;font-weight:700;color:var(--text1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tbl-badge{background:#1E3A8A;border:0.5px solid var(--accent);border-radius:20px;padding:3px 10px;font-size:11px;color:#93C5FD;font-weight:700;white-space:nowrap}
.cart-pill{display:none;align-items:center;gap:5px;background:var(--accent);border:none;border-radius:20px;padding:5px 11px;font-size:11px;font-weight:700;color:#fff;cursor:pointer;font-family:'Cairo',sans-serif;white-space:nowrap}
.cart-pill.show{display:flex}
.cart-pill-n{background:rgba(255,255,255,.25);border-radius:10px;padding:1px 6px;font-size:10px}
.back-btn{display:none;align-items:center;gap:4px;padding:5px 10px;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;flex-shrink:0;white-space:nowrap}
.back-btn.show{display:flex}

/* Cats grid */
.cats-wrap{padding:14px 12px 40px}
.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:460px){.cats-grid{grid-template-columns:repeat(3,1fr)}}
.cat-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.cat-card:active{opacity:.85}
/* صورة التصنيف مربعة 1:1 */
.cat-img-wrap{width:100%;aspect-ratio:1/1;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center}
.cat-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.cat-img-wrap .cat-emoji{font-size:48px;line-height:1}
.cat-info{padding:9px 11px}
.cat-name{font-size:13px;font-weight:700;color:var(--text1)}
.cat-cnt{font-size:10px;color:var(--text3);margin-top:2px}

/* Items grid */
.items-wrap{padding:12px;padding-bottom:160px}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:460px){.items-grid{grid-template-columns:repeat(3,1fr)}}
.item-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
/* صورة الصنف مربعة 1:1 */
.item-img-wrap{width:100%;aspect-ratio:1/1;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.item-img-wrap .item-emoji{font-size:40px;line-height:1}
.item-body{padding:9px 10px;flex:1;display:flex;flex-direction:column}
.item-name{font-size:12px;font-weight:700;color:var(--text1);line-height:1.3;margin-bottom:2px}
.item-desc{font-size:10px;color:var(--text3);line-height:1.3;flex:1;margin-bottom:6px}
.item-foot{display:flex;align-items:center;justify-content:space-between}
.item-price{font-size:14px;font-weight:900;color:var(--accent)}
.add-btn{padding:5px 12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}
.note-wrap{padding:0 10px 10px}
.note-inp{width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text1);font-size:11px;font-family:'Cairo',sans-serif;resize:none}
.note-inp:focus{outline:none;border-color:var(--accent)}
.note-inp::placeholder{color:var(--text3)}

/* Cart drawer */
.cart-drw{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:0.5px solid var(--border);padding:12px 14px 22px;z-index:60;transform:translateY(110%);transition:transform .25s}
.cart-drw.open{transform:translateY(0)}
.drw-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.drw-title{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.drw-count{background:var(--accent);color:#fff;border-radius:10px;padding:1px 7px;font-size:11px}
.drw-close{width:24px;height:24px;background:var(--bg3);border:0.5px solid var(--border);border-radius:6px;color:var(--text2);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.drw-items{display:flex;flex-direction:column;gap:6px;max-height:180px;overflow-y:auto;margin-bottom:10px;scrollbar-width:none}
.drw-items::-webkit-scrollbar{display:none}
.cart-row{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--bg3);border-radius:9px}
.cr-info{flex:1;min-width:0}
.cr-name{font-size:12px;font-weight:600;color:var(--text1)}
.cr-note{font-size:10px;color:var(--text3);margin-top:2px}
.cr-price{font-size:12px;font-weight:700;color:var(--accent);white-space:nowrap}
.rm-btn{width:22px;height:22px;border-radius:50%;background:rgba(239,68,68,.15);border:0.5px solid rgba(239,68,68,.3);color:#FCA5A5;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}
.send-btn:disabled{opacity:.5}

/* Utils */
.loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:14px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:#064E3B;border:0.5px solid var(--green);border-radius:12px;padding:9px 18px;font-size:12px;font-weight:700;color:#6EE7B7;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.success-scr{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:28px}
.success-scr.show{display:flex}
.s-icon{font-size:70px;animation:pop .4s ease-out}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
.s-title{font-size:22px;font-weight:900}
.s-sub{font-size:14px;color:var(--text2)}
.s-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px 18px;width:100%;max-width:320px;text-align:right}
.s-row{display:flex;justify-content:space-between;padding:5px 0;border-top:0.5px solid var(--border);font-size:12px;color:var(--text2)}
.s-row span:last-child{color:var(--accent);font-weight:700}
.new-btn{padding:11px 28px;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Cairo',sans-serif}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-right">
    <button class="back-btn" id="back-btn" onclick="goBack()">&#8592; رجوع</button>
    <div class="logo">C</div>
    <div class="pg-title" id="pg-title">Camp Game Zone</div>
  </div>
  <div class="hdr-left">
    <button class="cart-pill" id="cart-pill" onclick="openCart()">
      🛒 <span class="cart-pill-n" id="pill-n">0</span>
      <span id="pill-total">0 ج</span>
    </button>
    <div class="tbl-badge" id="tbl-badge">🪑 ...</div>
  </div>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div><span>جاري تحميل المنيو...</span></div>
</div>

<div class="cart-drw" id="cart-drw">
  <div class="drw-head">
    <div class="drw-title">🛒 طلبك <span class="drw-count" id="drw-count">0</span></div>
    <div class="drw-close" onclick="closeCart()">×</div>
  </div>
  <div class="drw-items" id="drw-items"></div>
  <button class="send-btn" id="send-btn" onclick="sendOrder()">أرسل الطلب 🛎</button>
</div>

<div class="toast" id="toast"></div>

<div class="success-scr" id="sscr">
  <div class="s-icon">✅</div>
  <div class="s-title">تم إرسال طلبك!</div>
  <div class="s-sub">الكاشير شايف طلبك دلوقتي 👀</div>
  <div class="s-card">
    <div style="font-size:13px;font-weight:700;margin-bottom:8px">تفاصيل الطلب</div>
    <div id="s-items"></div>
    <div style="display:flex;justify-content:space-between;padding:8px 0 0;font-size:13px;font-weight:700">
      <span>الإجمالي</span><span style="color:var(--green)" id="s-total">0 ج</span>
    </div>
  </div>
  <button class="new-btn" onclick="resetAll()">+ طلب جديد</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSyBtdqDQMiEnElUykFb2Tmoe_xB43kgf9O4",
  authDomain:"camp-game-zone-94940.firebaseapp.com",
  projectId:"camp-game-zone-94940",
  storageBucket:"camp-game-zone-94940.firebasestorage.app",
  messagingSenderId:"232147913506",
  appId:"1:232147913506:web:735c0fd763cb8ab0a7b37b"
});
const db = getFirestore(app), auth = getAuth(app);

// ── Table ────────────────────────────────────────────────
const tp = new URLSearchParams(location.search).get('table') || '؟';
const tableName = tp.match(/^\d+$/) ? 'طاولة '+tp : tp;
document.getElementById('tbl-badge').textContent = '🪑 '+tableName;
document.title = 'منيو — '+tableName;

// ── State ────────────────────────────────────────────────
let CDATA = {}, CART = [], view = 'cats';

function catEmoji(c) {
  if (!c) return '🍽️';
  if (c.match(/قهوة|اسبريسو|كابتشينو/)) return '☕';
  if (c.match(/مشروب|غازي|سودا|سوفت/)) return '🥤';
  if (c.match(/عصير|سموزي/)) return '🧃';
  if (c.match(/شاي/)) return '🫖';
  if (c.match(/بلايستيشن|PS|جيمز|العاب/)) return '🎮';
  if (c.match(/أكل|وجبة|طعام|سندوتش/)) return '🍔';
  if (c.match(/حلو|كيك/)) return '🍰';
  if (c.match(/شيشه|شيشا/)) return '💨';
  if (c.match(/واقل|وافل/)) return '🧇';
  if (c.match(/ميلك|شيك/)) return '🥛';
  return '🍽️';
}

// ── Load ─────────────────────────────────────────────────
async function load() {
  try {
    let hidden = [];
    try {
      const ss = await getDocs(collection(db,'menu_settings'));
      ss.forEach(d=>{ if(d.id==='hidden_cats') hidden=d.data().cats||[]; });
    } catch(e){}

    const ms = await getDocs(collection(db,'menu_items'));
    const ex = {};
    ms.forEach(d=>{ ex[d.id]=d.data(); });

    const snap = await getDocs(collection(db,'inventory'));
    CDATA = {};
    snap.forEach(d=>{
      const data=d.data();
      if(!data.forSale) return;
      if(hidden.indexOf(data.cat)!==-1) return;
      const cat=data.cat||'أخرى';
      if(!CDATA[cat]) CDATA[cat]={items:[],img:''};
      const e=ex[d.id]||{};
      const item={id:d.id,name:data.name||'—',price:parseFloat(data.salePrice||0),
        cat,img:e.img||data.img||'',desc:e.desc||data.desc||''};
      CDATA[cat].items.push(item);
      if(item.img&&!CDATA[cat].img) CDATA[cat].img=item.img;
    });
    showCats();
  } catch(e) {
    document.getElementById('content').innerHTML=
      '<div class="empty">⚠️ تعذر تحميل المنيو<br>تحقق من اتصالك بالنت</div>';
  }
}

// ── Cats page ─────────────────────────────────────────────
function showCats() {
  view='cats';
  document.getElementById('pg-title').textContent='Camp Game Zone';
  document.getElementById('back-btn').classList.remove('show');
  const cats=Object.keys(CDATA);
  if(!cats.length){
    document.getElementById('content').innerHTML='<div class="empty">لا يوجد أصناف</div>';
    return;
  }
  const html=cats.map(c=>{
    const d=CDATA[c];
    const imgInner=d.img
      ? '<img src="'+d.img+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'">'
        +'<span class="cat-emoji" style="display:none">'+catEmoji(c)+'</span>'
      : '<span class="cat-emoji">'+catEmoji(c)+'</span>';
    return '<div class="cat-card" onclick="_openCat(\''+c.replace(/\'/g,"\\'")+'\')">'
      +'<div class="cat-img-wrap">'+imgInner+'</div>'
      +'<div class="cat-info">'
      +'<div class="cat-name">'+c+'</div>'
      +'<div class="cat-cnt">'+d.items.length+' صنف</div>'
      +'</div></div>';
  }).join('');
  document.getElementById('content').innerHTML=
    '<div class="cats-wrap"><div class="cats-grid">'+html+'</div></div>';
}

window._openCat=function(cat){
  view='items';
  document.getElementById('pg-title').textContent=cat;
  document.getElementById('back-btn').classList.add('show');
  const items=(CDATA[cat]||{}).items||[];
  const html=items.map(it=>{
    const imgInner=it.img
      ? '<img src="'+it.img+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'block\'">'
        +'<span class="item-emoji" style="display:none">'+catEmoji(it.cat)+'</span>'
      : '<span class="item-emoji">'+catEmoji(it.cat)+'</span>';
    const safeId=it.id, safeName=it.name.replace(/\'/g,"\\'"), safeCat=it.cat.replace(/\'/g,"\\'");
    return '<div class="item-card">'
      +'<div class="item-img-wrap">'+imgInner+'</div>'
      +'<div class="item-body">'
      +'<div class="item-name">'+it.name+'</div>'
      +(it.desc?'<div class="item-desc">'+it.desc+'</div>':'<div class="item-desc"></div>')
      +'<div class="item-foot">'
      +'<div class="item-price">'+it.price+' ج</div>'
      +'<button class="add-btn" onclick="_add(\''+safeId+'\',\''+safeName+'\','+it.price+',\''+safeCat+'\')">+ أضف</button>'
      +'</div></div>'
      +'<div class="note-wrap" id="nw-'+it.id+'" style="display:none">'
      +'<textarea class="note-inp" id="note-'+it.id+'" rows="2" placeholder="ملاحظة... (زيادة سكر، بدون ثلج...)"></textarea>'
      +'</div></div>';
  }).join('');
  document.getElementById('content').innerHTML=
    '<div class="items-wrap"><div class="items-grid">'+html+'</div></div>';
};

window.goBack=function(){
  closeCart();
  showCats();
};

// ── Cart ─────────────────────────────────────────────────
window._add=function(id,name,price,cat){
  CART.push({id,name,price,cat,uid:Math.random()});
  const nw=document.getElementById('nw-'+id);
  if(nw) nw.style.display='block';
  updatePill();
  toast('✓ تم إضافة '+name);
};

window._rm=function(uid){
  CART=CART.filter(i=>i.uid!==uid);
  updatePill();
  renderDrawer();
};

function updatePill(){
  const pill=document.getElementById('cart-pill');
  const total=CART.reduce((s,i)=>s+i.price,0);
  if(!CART.length){pill.classList.remove('show');return;}
  pill.classList.add('show');
  document.getElementById('pill-n').textContent=CART.length;
  document.getElementById('pill-total').textContent=total+' ج';
  document.getElementById('drw-count').textContent=CART.length;
}

function renderDrawer(){
  document.getElementById('drw-items').innerHTML=CART.map(i=>
    '<div class="cart-row">'
    +'<div class="cr-info"><div class="cr-name">'+i.name+'</div>'
    +(i.note?'<div class="cr-note">📝 '+i.note+'</div>':'')
    +'</div>'
    +'<div class="cr-price">'+i.price+' ج</div>'
    +'<button class="rm-btn" onclick="_rm('+i.uid+')">×</button>'
    +'</div>'
  ).join('');
}

window.openCart=function(){
  if(!CART.length) return;
  renderDrawer();
  document.getElementById('cart-drw').classList.add('open');
};
window.closeCart=function(){
  document.getElementById('cart-drw').classList.remove('open');
};

// ── Send ─────────────────────────────────────────────────
window.sendOrder=async function(){
  if(!CART.length) return;
  const btn=document.getElementById('send-btn');
  btn.disabled=true; btn.textContent='جاري الإرسال...';
  try{
    const items=CART.map(i=>{
      const n=document.getElementById('note-'+i.id);
      return {id:i.id,name:i.name,price:i.price,cat:i.cat,note:n?n.value.trim():''};
    });
    const total=items.reduce((s,i)=>s+i.price,0);
    await addDoc(collection(db,'menu_orders'),{
      table:tableName,tableNum:tp,items,total,status:'pending',
      timestamp:serverTimestamp(),
      time:new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}),
      date:new Date().toLocaleDateString('ar-EG'),
    });
    document.getElementById('s-items').innerHTML=
      items.map(i=>'<div class="s-row"><span>'+i.name+(i.note?' — '+i.note:'')+'</span><span>'+i.price+' ج</span></div>').join('');
    document.getElementById('s-total').textContent=total+' ج';
    document.getElementById('sscr').classList.add('show');
    closeCart();
  }catch(e){
    toast('⚠️ حصل خطأ، حاول تاني');
    btn.disabled=false; btn.textContent='أرسل الطلب 🛎';
  }
};

window.resetAll=function(){
  CART=[];
  updatePill();
  document.getElementById('sscr').classList.remove('show');
  showCats();
};

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── Start ────────────────────────────────────────────────
async function start(){
  try{
    if(!auth.currentUser) await signInAnonymously(auth);
    await load();
  }catch(e){
    if(e.code==='auth/operation-not-allowed'){
      document.getElementById('content').innerHTML=
        '<div class="empty">⚠️ فعّل Anonymous Auth في Firebase Console</div>';
    } else { await load(); }
  }
}
start();
</script>
</body>
</html>

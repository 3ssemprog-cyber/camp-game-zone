<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<title>Camp Game Zone — التقارير</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:960px;margin:0 auto;padding:20px 16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mn-btn{padding:6px 14px;border:0.5px solid var(--border);border-radius:9px;font-size:12px;cursor:pointer;background:var(--bg2);color:var(--text1);font-family:'Cairo',sans-serif}
.mn-btn:hover{border-color:var(--accent)}
.mn-title{font-size:15px;font-weight:700;color:var(--text1)}
.kards6{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
@media(max-width:600px){.kards6{grid-template-columns:repeat(2,1fr)}}
.kard{border-radius:10px;padding:11px 10px;text-align:center;border:0.5px solid}
.kl{font-size:10px;margin-bottom:4px}
.kv{font-size:15px;font-weight:700}
.k-inc{background:#064E3B;border-color:var(--green)}.k-inc .kl{color:#6EE7B7}.k-inc .kv{color:#6EE7B7}
.k-cash{background:#1E3A8A;border-color:var(--accent)}.k-cash .kl{color:#93C5FD}.k-cash .kv{color:#93C5FD}
.k-elec{background:#2E1065;border-color:var(--purple)}.k-elec .kl{color:#C4B5FD}.k-elec .kv{color:#C4B5FD}
.k-dexp{background:#450A0A;border-color:var(--red)}.k-dexp .kl{color:#FCA5A5}.k-dexp .kv{color:#FCA5A5}
.k-mexp{background:#451A03;border-color:var(--amber)}.k-mexp .kl{color:#FCD34D}.k-mexp .kv{color:#FCD34D}
.k-sal{background:#1C1917;border-color:#78716C}.k-sal .kl{color:#A8A29E}.k-sal .kv{color:#D6D3D1}
.k-net{background:#0F172A;border-color:var(--accent)}.k-net .kl{color:#93C5FD}.k-net .kv{color:#fff}
.days-tbl th{background:var(--bg3);padding:7px 10px;text-align:right;font-weight:600;color:var(--text2);font-size:10px;border-bottom:0.5px solid var(--border)}
.days-tbl td{padding:7px 10px;text-align:right;border-top:0.5px solid var(--border);color:var(--text1);font-size:11px}
.days-tbl tr:hover td{background:var(--bg3)}
.today-row td{background:#1E3A8A!important;color:#93C5FD!important}
.export-btn{padding:3px 10px;background:#064E3B;border:0.5px solid var(--green);border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;color:#6EE7B7;font-family:'Cairo',sans-serif;white-space:nowrap}
.mexp-row{display:flex;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:9px;font-size:12px;margin-bottom:5px}
.net-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#0F172A;border:0.5px solid var(--accent);border-radius:12px;margin-top:12px}
.net-lbl{font-size:13px;color:#93C5FD;font-weight:600}
.net-val{font-size:20px;font-weight:700}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex">
    <div class="logo">C</div>
    <div class="app-name">التقارير الشهرية</div>
  </div>
  <div class="tb-flex">
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div class="month-nav">
    <button class="mn-btn" onclick="changeMonth(-1)">&#8594; السابق</button>
    <div class="mn-title" id="month-title"></div>
    <button class="mn-btn" onclick="changeMonth(1)">التالي &#8592;</button>
  </div>

  <div class="kards6" id="sum-kards"></div>

  <div class="sec-lbl">تفاصيل الأيام</div>
  <div class="tbl-wrap" style="margin-bottom:16px">
    <table class="dtbl days-tbl" style="width:100%;border-collapse:collapse;table-layout:fixed">
      <thead><tr>
        <th style="width:90px">التاريخ</th>
        <th style="width:80px">نقدي</th>
        <th style="width:90px">دفع إلكتروني</th>
        <th style="width:80px">مصاريف</th>
        <th style="width:80px">الصافي</th>
        <th style="width:70px">تفاصيل</th>
      </tr></thead>
      <tbody id="days-body"></tbody>
    </table>
  </div>

  <div class="sec-lbl">المصاريف الشهرية</div>
  <div id="mexp-list" style="margin-bottom:4px"></div>

  <div id="sal-details" style="display:none;margin-bottom:8px">
    <div class="sec-lbl">تفاصيل المرتبات</div>
    <div id="sal-details-list"></div>
  </div>

  <div class="net-bar">
    <span class="net-lbl">صافي الشهر (دخل − مصاريف يومية − مصاريف شهرية − مرتبات)</span>
    <span class="net-val" id="net-month">0.00 ج</span>
  </div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, fmt,
  collection, getDocs, query, where, orderBy } from './firebase.js';

const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const MAX_MONTH=11; // ديسمبر 2026
let curMonth=new Date().getMonth();
let curYear=2026;

function monthKey(m,y){ return`${y}-${String(m+1).padStart(2,'0')}`; }

async function loadMonth(m,y){
  const mk=monthKey(m,y);
  let days=[], mExps=[], salaries=0;

  // Load daily closings
  try{
    const snap=await getDocs(query(collection(db,'daily_closing'),where('monthKey','==',mk)));
    snap.forEach(d=>days.push(d.data()));
    days.sort((a,b)=>a.dayKey>b.dayKey?1:-1);
  }catch(e){}

  // Load monthly expenses
  try{
    const snap=await getDocs(query(collection(db,'monthly_expenses'),where('monthKey','==',mk)));
    snap.forEach(d=>mExps.push(d.data()));
  }catch(e){}

  // Load salaries closed this month from salary_closing collection
  try{
    const snap=await getDocs(query(collection(db,'salary_closing'),where('monthKey','==',mk)));
    snap.forEach(d=>{
      const data=d.data();
      // لو مش عجز — المرتب الصافي بيتحسب كمصروف
      if(!data.isDeficit) salaries+=parseFloat(data.net||0);
      else salaries+=parseFloat(data.salary||0); // المرتب كامل كمصروف حتى لو في عجز
    });
  }catch(e){}

  // Load salary details for display
  let salaryDetails=[];
  try{
    const snap=await getDocs(query(collection(db,'salary_closing'),where('monthKey','==',mk)));
    snap.forEach(d=>salaryDetails.push(d.data()));
  }catch(e){}

  return {days, mExps, salaries, salaryDetails};
}

function fmt2(n){ return parseFloat(n||0).toFixed(2)+' ج'; }

async function render(){
  document.getElementById('month-title').textContent=`${MONTHS[curMonth]} ${curYear}`;
  const {days,mExps,salaries,salaryDetails}=await loadMonth(curMonth,curYear);

  const todayKey=new Date().toISOString().split('T')[0];
  const totCash=days.reduce((s,d)=>s+(d.cash||0),0);
  const totElec=days.reduce((s,d)=>s+(d.elec||0),0);
  const totInc=totCash+totElec;
  const totDexp=days.reduce((s,d)=>s+(d.totalExp||0),0);
  const totMexp=mExps.reduce((s,e)=>s+(e.amt||0),0);
  const netMonth=totInc-totDexp-totMexp-salaries;

  // Summary cards
  document.getElementById('sum-kards').innerHTML=`
    <div class="kard k-inc"><div class="kl">الدخل الشهري</div><div class="kv">${fmt2(totInc)}</div></div>
    <div class="kard k-cash"><div class="kl">نقدي</div><div class="kv">${fmt2(totCash)}</div></div>
    <div class="kard k-elec"><div class="kl">دفع إلكتروني</div><div class="kv">${fmt2(totElec)}</div></div>
    <div class="kard k-dexp"><div class="kl">مصاريف يومية</div><div class="kv">${fmt2(totDexp)}</div></div>
    <div class="kard k-mexp"><div class="kl">مصاريف شهرية</div><div class="kv">${fmt2(totMexp)}</div></div>
    <div class="kard k-sal" style="cursor:${salaryDetails.length?'pointer':'default'}" onclick="toggleSalDetails()"><div class="kl">مرتبات (${salaryDetails.length} موظف)</div><div class="kv">${fmt2(salaries)}</div></div>`;

  // Days table
  document.getElementById('days-body').innerHTML=days.length
    ?days.map(d=>`
      <tr class="${d.dayKey===todayKey?'today-row':''}">
        <td>${d.date||d.dayKey}${d.dayKey===todayKey?'<span style="font-size:9px;margin-right:4px;color:#93C5FD"> اليوم</span>':''}</td>
        <td style="color:#6EE7B7;font-weight:600">${fmt2(d.cash)}</td>
        <td style="color:#C4B5FD;font-weight:600">${fmt2(d.elec)}</td>
        <td style="color:#FCA5A5">${fmt2(d.totalExp)}</td>
        <td style="font-weight:700">${fmt2((d.cash||0)+(d.elec||0)-(d.totalExp||0))}</td>
        <td><div class="export-btn" onclick="exportDay('${d.dayKey}','${d.date||d.dayKey}')">📥 XLSX</div></td>
      </tr>`).join('')
    :'<tr><td colspan="6" style="text-align:center;padding:16px;color:var(--text3)">لا يوجد بيانات لهذا الشهر</td></tr>';

  // Monthly expenses
  document.getElementById('mexp-list').innerHTML=mExps.length
    ?mExps.map(e=>`<div class="mexp-row"><span style="color:var(--text2)">${e.cat}</span><span style="font-weight:700;color:#FCD34D">${fmt2(e.amt)}</span></div>`).join('')
    :'<div style="font-size:12px;color:var(--text3);padding:8px">لا يوجد مصاريف شهرية</div>';

  // Salary details list
  const salList=document.getElementById('sal-details-list');
  if(salList){
    salList.innerHTML=salaryDetails.length
      ?salaryDetails.map(s=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:var(--bg3);border-radius:9px;font-size:12px;margin-bottom:5px">
          <div>
            <span style="font-weight:600;color:var(--text1)">${s.empName}</span>
            <span style="font-size:10px;color:var(--text3);margin-right:6px">${s.date||''}</span>
            ${s.isDeficit?`<span style="font-size:10px;color:#FCA5A5">(عجز)</span>`:''}
          </div>
          <span style="font-weight:700;color:#FCD34D">${fmt2(s.isDeficit?s.salary:s.net)}</span>
        </div>`).join('')
      :'<div style="font-size:12px;color:var(--text3);padding:8px">لا يوجد مرتبات مقفلة هذا الشهر</div>';
  }

  // Net
  const netEl=document.getElementById('net-month');
  netEl.textContent=fmt2(netMonth);
  netEl.style.color=netMonth>=0?'#6EE7B7':'#FCA5A5';
}

window.toggleSalDetails=function(){
  const el=document.getElementById('sal-details');
  if(el) el.style.display=el.style.display==='none'?'block':'none';
};

window.changeMonth=function(d){
  curMonth+=d;
  if(curMonth<0){curMonth=0;}
  if(curMonth>MAX_MONTH){curMonth=MAX_MONTH;}
  render();
};

window.exportDay=async function(dayKey,dateLabel){
  try{
    // جيب بيانات اليوم من daily_closing (نفس مصدر التقارير)
    const closingSnap=await getDocs(query(collection(db,'daily_closing'),where('dayKey','==',dayKey)));
    let closingData=null;
    closingSnap.forEach(d=>{ closingData=d.data(); });

    // جيب الجلسات من pos_sessions بـ dayKey
    const snap=await getDocs(query(collection(db,'pos_sessions'),where('dayKey','==',dayKey)));
    const sessions=[];
    snap.forEach(d=>sessions.push(d.data()));

    // لو مفيش جلسات جرب بالـ date
    if(!sessions.length){
      const snap2=await getDocs(query(collection(db,'pos_sessions'),where('date','==',dateLabel)));
      snap2.forEach(d=>sessions.push(d.data()));
    }

    const expSnap=await getDocs(query(collection(db,'daily_expenses'),where('dayKey','==',dayKey)));
    const exps=[];
    expSnap.forEach(d=>exps.push(d.data()));

    // استخدم daily_closing للتوتالات لو موجود — أدق
    let totalCash=0, totalElec=0, totalSales=0, totalExps=0;
    if(closingData){
      totalCash  = parseFloat(closingData.cash||0);
      totalElec  = parseFloat(closingData.elec||0);
      totalSales = parseFloat(closingData.totalIncome||0) || (totalCash+totalElec);
      totalExps  = parseFloat(closingData.totalExp||0);
    } else {
      sessions.forEach(s=>{
        totalCash +=parseFloat(s.cashAmt||0);
        totalElec +=parseFloat(s.elecAmt||0);
        totalSales+=parseFloat(s.total||0);
      });
      exps.forEach(e=>{ totalExps+=parseFloat(e.amt||0); });
    }

    const r=(v)=>parseFloat(v||0).toFixed(2);

    // ── بناء XLSX بـ SheetJS ──────────────────────────────
    const wb = XLSX.utils.book_new();
    const ws_data = [];

    // ألوان
    const C_TITLE   = {fgColor:{rgb:'1E3A8A'}};  // أزرق داكن
    const C_SECTION = {fgColor:{rgb:'064E3B'}};  // أخضر داكن
    const C_HEADER  = {fgColor:{rgb:'263348'}};  // رمادي داكن
    const C_TOTAL   = {fgColor:{rgb:'1C1917'}};  // بني داكن
    const C_NET_POS = {fgColor:{rgb:'064E3B'}};  // أخضر
    const C_NET_NEG = {fgColor:{rgb:'450A0A'}};  // أحمر

    const boldW = {font:{bold:true,color:{rgb:'FFFFFF'}},fill:{patternType:'solid'},alignment:{horizontal:'right'}};
    const boldB = {font:{bold:true},alignment:{horizontal:'right'}};
    const numS  = {alignment:{horizontal:'left'},numFmt:'#,##0.00'};
    const muted = {font:{color:{rgb:'64748B'}},alignment:{horizontal:'right'}};

    function titleRow(text) {
      return [{v:text, s:{...boldW, fill:{patternType:'solid',...C_TITLE}}},'','','','',''];
    }
    function sectionRow(text) {
      return [{v:text, s:{...boldW, fill:{patternType:'solid',...C_SECTION}}},'','','','',''];
    }
    function headerRow(...cols) {
      return cols.map(c=>({v:c, s:{...boldW, fill:{patternType:'solid',...C_HEADER}}}));
    }
    function dataRow(...cols) {
      return cols.map((c,i)=>({v:c, s: i>0 ? numS : {alignment:{horizontal:'right'}}}));
    }
    function totalRow(...cols) {
      return cols.map((c,i)=>({v:c, s:{...boldB, fill:{patternType:'solid',...C_TOTAL}, ...(i>0?{numFmt:'#,##0.00'}:{})}}));
    }

    // ── العنوان ──
    ws_data.push(titleRow(`تقرير يوم ${dateLabel}`));
    ws_data.push([{v:'وقت الطباعة', s:muted}, {v:new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}), s:muted},'','','','']);
    ws_data.push(['','','','','','']);

    // ── الملخص السريع ──
    ws_data.push(sectionRow('📊 الملخص السريع'));
    ws_data.push(headerRow('البند','المبلغ (ج)'));
    ws_data.push(dataRow('إجمالي المبيعات (نقدي)', parseFloat(r(totalCash))));
    ws_data.push(dataRow('إجمالي المبيعات (إلكتروني)', parseFloat(r(totalElec))));
    ws_data.push(dataRow('إجمالي المبيعات', parseFloat(r(totalSales))));
    ws_data.push(dataRow('إجمالي المصاريف', parseFloat(r(totalExps))));
    const net = totalSales - totalExps;
    ws_data.push([
      {v:'✅ صافي اليوم', s:{font:{bold:true,color:{rgb:'FFFFFF'}},fill:{patternType:'solid',...(net>=0?C_NET_POS:C_NET_NEG)},alignment:{horizontal:'right'}}},
      {v:parseFloat(r(net)), s:{font:{bold:true,color:{rgb:'FFFFFF'}},fill:{patternType:'solid',...(net>=0?C_NET_POS:C_NET_NEG)},numFmt:'#,##0.00'}},
      '','','',''
    ]);
    ws_data.push(['','','','','','']);

    // ── تفاصيل المبيعات ──
    ws_data.push(sectionRow('📋 تفاصيل المبيعات'));
    ws_data.push(headerRow('الطاولة','الأصناف','نقدي (ج)','إلكتروني (ج)','الإجمالي (ج)','الوقت'));
    if(sessions.length){
      sessions.forEach(s=>{
        const items=(s.items||[]).map(i=>`${i.n||''} x${i.q||1}`).join(' | ');
        const sessItems=(s.sessions||[]).map(ss=>`${ss.cat||''} ${ss.dur?Math.round(ss.dur/60000)+'د':''}`).join(' | ');
        const allItems=[sessItems,items].filter(Boolean).join(' | ');
        ws_data.push([
          {v:s.table||'—', s:{alignment:{horizontal:'right'}}},
          {v:allItems||'—', s:{alignment:{horizontal:'right'}}},
          {v:parseFloat(r(s.cashAmt)), s:numS},
          {v:parseFloat(r(s.elecAmt)), s:numS},
          {v:parseFloat(r(s.total)), s:numS},
          {v:s.time||'—', s:{alignment:{horizontal:'right'}}}
        ]);
      });
      ws_data.push(totalRow('الإجمالي','', parseFloat(r(totalCash)), parseFloat(r(totalElec)), parseFloat(r(totalSales)),''));
    } else {
      ws_data.push(dataRow('—','لا يوجد مبيعات','—','—','—','—'));
    }
    ws_data.push(['','','','','','']);

    // ── تفاصيل المصاريف ──
    ws_data.push(sectionRow('💸 تفاصيل المصاريف'));
    ws_data.push(headerRow('البند','المبلغ (ج)','الوقت','ملاحظة'));
    if(exps.length){
      exps.forEach(e=>{
        ws_data.push([
          {v:e.cat||'—', s:{alignment:{horizontal:'right'}}},
          {v:parseFloat(r(e.amt)), s:numS},
          {v:e.time||'—', s:{alignment:{horizontal:'right'}}},
          {v:e.note||'—', s:{alignment:{horizontal:'right'}}}
        ]);
      });
      ws_data.push(totalRow('الإجمالي', parseFloat(r(totalExps)),'',''));
    } else {
      ws_data.push(dataRow('—','لا يوجد مصاريف','—','—'));
    }

    // ── بناء الشيت ──
    const ws = XLSX.utils.aoa_to_sheet(ws_data);

    // عرض الأعمدة
    ws['!cols'] = [
      {wch:30}, // A
      {wch:35}, // B
      {wch:16}, // C
      {wch:18}, // D
      {wch:16}, // E
      {wch:12}, // F
    ];

    XLSX.utils.book_append_sheet(wb, ws, 'التقرير');
    XLSX.writeFile(wb, `تقرير_${dateLabel}.xlsx`);
  }catch(e){alert('حصل خطأ في التصدير: '+e.message);}
};

requireAuth(async(user,userData)=>{
  document.getElementById('uname').textContent=user.uid===ADMIN_UID?'Admin':(userData?.name||user.email);
  await render();
});
</script>
</body>
</html>

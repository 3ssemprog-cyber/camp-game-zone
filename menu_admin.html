<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — إدارة المنيو</title>
<link rel="stylesheet" href="theme.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
.main{max-width:960px;margin:0 auto;padding:16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.page-tabs{display:flex;gap:6px;margin-bottom:16px}
.ptab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;border:0.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--bg2);color:var(--text2);font-family:'Cairo',sans-serif;transition:all .15s}
.ptab.act{background:#1E3A8A;border-color:var(--accent);color:#fff}
.page{display:none;flex-direction:column;gap:12px}
.page.act{display:flex}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.iadm{background:var(--bg2);border:0.5px solid var(--border);border-radius:12px;overflow:hidden}
.iadm-img{width:100%;height:110px;object-fit:cover;display:block;background:var(--bg3)}
.iadm-ph{width:100%;height:110px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:30px}
.iadm-body{padding:10px 12px}
.iadm-name{font-size:13px;font-weight:700;color:var(--text1)}
.iadm-cat{font-size:10px;color:var(--text3);margin-bottom:4px}
.iadm-price{font-size:14px;font-weight:900;color:var(--accent);margin-bottom:8px}
.img-btn{width:100%;padding:6px;background:var(--bg3);border:0.5px solid var(--border);border-radius:7px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Cairo',sans-serif;text-align:center;transition:all .15s}
.img-btn:hover{border-color:var(--accent);color:var(--text1)}
.img-form{padding:10px 12px;border-top:0.5px solid var(--border);display:none;flex-direction:column;gap:6px}
.img-form.open{display:flex}
.url-inp{width:100%;padding:7px 9px;border:0.5px solid var(--border);border-radius:8px;font-size:11px;background:var(--bg);color:var(--text1);font-family:'Cairo',sans-serif}
.url-inp::placeholder{color:var(--text3)}
.url-inp:focus{outline:none;border-color:var(--accent)}
.desc-area{width:100%;padding:6px 9px;border:0.5px solid var(--border);border-radius:8px;font-size:11px;background:var(--bg);color:var(--text1);font-family:'Cairo',sans-serif;resize:none}
.desc-area::placeholder{color:var(--text3)}
.desc-area:focus{outline:none;border-color:var(--accent)}
.save-btn{padding:7px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}
.bc-setup{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:12px}
.bc-setup label{font-size:12px;color:var(--text2)}
.num-inp{width:70px;padding:7px;border:0.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text1);font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;text-align:center}
.gen-btn{padding:8px 18px;background:var(--accent);border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif}
.print-btn{padding:8px 16px;background:var(--bg3);border:0.5px solid var(--border);border-radius:9px;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:'Cairo',sans-serif}
.bc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.bc-card{background:#fff;border-radius:12px;padding:14px;text-align:center}
.bc-label{font-size:13px;font-weight:900;color:#000;margin-bottom:8px;font-family:'Cairo',sans-serif}
.bc-sub{font-size:10px;color:#666;margin-top:6px;font-family:'Cairo',sans-serif}

@media print{
  .topbar,.page-tabs,#page-items,.bc-setup,.card-head{display:none!important}
  .main{padding:0}
  #page-barcodes{display:grid!important;grid-template-columns:repeat(3,1fr);gap:12px;padding:10px}
  .bc-card{border:1px solid #ddd;break-inside:avoid}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex">
    <div class="logo">C</div>
    <div class="app-name">إدارة المنيو</div>
  </div>
  <div class="tb-flex">
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div class="page-tabs">
    <div class="ptab act" onclick="showPg('items',this)">🍽️ أصناف المنيو</div>
    <div class="ptab" onclick="showPg('barcodes',this)">📱 QR Codes الطاولات</div>
  </div>

  <!-- ===== Items ===== -->
  <div class="page act" id="page-items">
    <div class="card">
      <div class="card-head">الأصناف المتاحة للبيع</div>
      <div class="card-body">
        <div style="font-size:11px;color:var(--text3);margin-bottom:10px">
          الأصناف دي من المخزن (forSale=true) — من هنا بتضيف صورة ووصف لكل صنف يظهر في المنيو
        </div>
        <div class="items-grid" id="items-grid">
          <div style="text-align:center;padding:30px;color:var(--text3);grid-column:1/-1">جاري التحميل...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== QR Codes ===== -->
  <div class="page" id="page-barcodes">
    <div class="card">
      <div class="card-head" style="display:flex;align-items:center;justify-content:space-between">
        <span>📱 QR Codes الطاولات</span>
        <button class="print-btn" onclick="window.print()">🖨️ طباعة الكل</button>
      </div>
      <div class="card-body">
        <div style="font-size:11px;color:var(--text3)">QR Code لكل طاولة — الزبون يمسحه يفتح المنيو مباشرة</div>
      </div>
    </div>
    <div class="bc-grid" id="bc-grid">
      <div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text3)">جاري تحميل الطاولات...</div>
    </div>
  </div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth,
  collection, getDocs, doc, setDoc }
  from './firebase.js';

const BASE = window.location.origin +
  window.location.pathname.replace('menu_admin.html','') + 'menu.html';

// ── Tabs ─────────────────────────────────────────────────
window.showPg = function(p, el) {
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('act'));
  document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('act'));
  document.getElementById('page-'+p).classList.add('act');
  el.classList.add('act');
};

// ── Load items ───────────────────────────────────────────
async function loadItems() {
  try {
    const mSnap = await getDocs(collection(db,'menu_items'));
    const ex = {};
    mSnap.forEach(d => ex[d.id] = d.data());

    const snap = await getDocs(collection(db,'inventory'));
    const list = [];
    snap.forEach(d => {
      const data = d.data();
      if (!data.forSale) return;
      list.push({ id:d.id, name:data.name, price:data.salePrice||0, cat:data.cat||'أخرى',
        img:(ex[d.id]||{}).img||'', desc:(ex[d.id]||{}).desc||'' });
    });

    const grid = document.getElementById('items-grid');
    if (!list.length) {
      grid.innerHTML='<div style="text-align:center;padding:30px;color:var(--text3);grid-column:1/-1">لا يوجد أصناف للبيع</div>';
      return;
    }
    grid.innerHTML = list.map(iCard).join('');
  } catch(e) {
    document.getElementById('items-grid').innerHTML='<div style="color:var(--red)">حصل خطأ</div>';
  }
}

function iCard(it) {
  const img = it.img
    ? `<img class="iadm-img" id="pimg-${it.id}" src="${it.img}"
         onerror="this.outerHTML='<div class=\\"iadm-ph\\" id=\\"pimg-${it.id}\\">🍽️</div>'">`
    : `<div class="iadm-ph" id="pimg-${it.id}">🍽️</div>`;
  return `
  <div class="iadm">
    ${img}
    <div class="iadm-body">
      <div class="iadm-name">${it.name}</div>
      <div class="iadm-cat">${it.cat}</div>
      <div class="iadm-price">${it.price} ج</div>
      <div class="img-btn" onclick="toggleF('${it.id}')">📷 تعديل الصورة والوصف</div>
    </div>
    <div class="img-form" id="f-${it.id}">
      <input class="url-inp" id="u-${it.id}" placeholder="URL الصورة..." value="${it.img}"
        onkeydown="if(event.key==='Enter')save('${it.id}')">
      <textarea class="desc-area" id="d-${it.id}" rows="2"
        placeholder="وصف قصير (اختياري)...">${it.desc}</textarea>
      <button class="save-btn" onclick="save('${it.id}')">💾 حفظ</button>
    </div>
  </div>`;
}

window.toggleF = id => {
  const f = document.getElementById('f-'+id);
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById('u-'+id).focus();
};

window.save = async id => {
  const url  = (document.getElementById('u-'+id)?.value || '').trim();
  const desc = (document.getElementById('d-'+id)?.value || '').trim();
  try {
    await setDoc(doc(db,'menu_items',id), {img:url,desc}, {merge:true});
    if (url) {
      const prev = document.getElementById('pimg-'+id);
      if (prev) prev.outerHTML = `<img class="iadm-img" id="pimg-${id}" src="${url}">`;
    }
    document.getElementById('f-'+id).classList.remove('open');
    toast('✓ تم الحفظ');
  } catch(e) { alert('حصل خطأ'); }
};

// ── QR Codes من الطاولات المسجلة ─────────────────────────
async function loadQRCodes() {
  const grid = document.getElementById('bc-grid');
  try {
    const snap = await getDocs(collection(db, 'tables'));
    const tables = [];
    snap.forEach(d => tables.push({ id: d.id, ...d.data() }));
    tables.sort((a, b) => (a.name || '').localeCompare(b.name || '', 'ar'));

    if (!tables.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">لا يوجد طاولات مسجلة — اضيف طاولات من الإعدادات أول</div>';
      return;
    }

    grid.innerHTML = tables.map(t =>
      `<div class="bc-card" id="bc-${t.id}">
        <div class="bc-label">🪑 ${t.name}</div>
        <div id="qr-${t.id}" style="display:flex;justify-content:center;margin:8px 0"></div>
        <div class="bc-sub">امسح لفتح المنيو</div>
        <div class="bc-sub" style="font-size:9px;color:#999;margin-top:3px;word-break:break-all">${BASE}?table=${encodeURIComponent(t.name)}</div>
      </div>`
    ).join('');

    // رسم QR لكل طاولة
    tables.forEach(t => {
      const url = BASE + '?table=' + encodeURIComponent(t.name);
      new QRCode(document.getElementById('qr-' + t.id), {
        text:          url,
        width:         150,
        height:        150,
        colorDark:     '#000000',
        colorLight:    '#ffffff',
        correctLevel:  QRCode.CorrectLevel.M,
      });
    });

  } catch(e) {
    grid.innerHTML = '<div style="grid-column:1/-1;color:var(--red);text-align:center;padding:20px">حصل خطأ في تحميل الطاولات</div>';
  }
}

function toast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:76px;left:50%;transform:translateX(-50%);'+
    'background:#064E3B;border:0.5px solid #10B981;border-radius:10px;'+
    'padding:9px 18px;font-size:12px;font-weight:700;color:#6EE7B7;z-index:999';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

requireAuth(async (user) => {
  if (user.uid !== ADMIN_UID) { window.location.href='dashboard.html'; return; }
  document.getElementById('uname').textContent = 'Admin';
  await loadItems();
  await loadQRCodes();
});
</script>
</body>
</html>

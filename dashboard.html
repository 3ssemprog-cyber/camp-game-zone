<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — الداشبورد</title>
<link rel="stylesheet" href="theme.css">
<style>
  .main{max-width:900px;margin:0 auto;padding:20px 16px}
  .welcome{margin-bottom:20px}
  .welcome-name{font-size:22px;font-weight:700;color:var(--text1)}
  .welcome-sub{font-size:13px;color:var(--text3);margin-top:3px}
  .sections-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  @media(max-width:600px){.sections-grid{grid-template-columns:repeat(2,1fr)}}
  .sec-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:16px 12px;cursor:pointer;transition:all .15s;text-align:center}
  .sec-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(59,130,246,0.12);transform:translateY(-2px)}
  .sec-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px;background:var(--bg3)}
  .sec-name{font-size:13px;font-weight:600;color:var(--text1)}
  .sec-desc{font-size:11px;color:var(--text3);margin-top:2px}
  .locked-sec{opacity:.35;cursor:not-allowed;pointer-events:none}
  .locked-sec:hover{transform:none;box-shadow:none}
  .locked-lbl{font-size:10px;color:var(--text3);margin-top:4px}
  .locked-note{padding:9px 13px;background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;font-size:12px;color:var(--text3);margin-bottom:14px}
  .tb-flex{display:flex;align-items:center;gap:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-flex">
    <div class="logo">C</div>
    <div class="app-name">Camp Game Zone</div>
  </div>
  <div class="tb-flex">
    <div class="clock" id="clock"></div>
    <div class="user-chip"><div class="user-dot"></div><span id="user-name">...</span></div>
    <div class="logout-btn" onclick="doLogout()">خروج</div>
  </div>
</div>

<div class="main">
  <div class="welcome">
    <div class="welcome-name" id="welcome-name">أهلاً...</div>
    <div class="welcome-sub" id="welcome-sub">جاري التحميل...</div>
  </div>

  <div id="notif-area"></div>
  <div id="locked-note" style="display:none" class="locked-note">بعض الأقسام مقفولة — تواصل مع الأدمن لفتح صلاحيات إضافية</div>

  <div class="sec-lbl">الأقسام المتاحة</div>
  <div class="sections-grid" id="sections-grid"></div>
</div>

<script type="module">
import { auth, db, ADMIN_UID, requireAuth, signOut, collection, getDocs } from './firebase.js';

const SECTIONS = [
  {id:'pos',     name:'نقطة البيع',     desc:'البيع والطاولات',    icon:'🖥',  page:'pos.html',          perm:'view_tables'},
  {id:'emp',     name:'الموظفين',       desc:'مرتبات وسحوبات',    icon:'👥',  page:'employees.html',    perm:'view_emp'},
  {id:'exp',     name:'المصاريف',       desc:'يومية وشهرية',      icon:'💸',  page:'expenses.html',     perm:'view_exp'},
  {id:'inv',     name:'المخزن',         desc:'أصناف وكميات',      icon:'📦',  page:'inventory.html',    perm:'view_inv'},
  {id:'rep',     name:'التقارير',       desc:'شهري وسنوي',        icon:'📊',  page:'reports.html',      perm:'view_rep'},
  {id:'close',   name:'التقفيل اليومي', desc:'ملخص اليوم',        icon:'🔒',  page:'closing.html',      perm:'view_close'},
  {id:'trans',   name:'المعاملات',      desc:'سجل الأكشن',        icon:'📋',  page:'transactions.html', perm:'view_rep'},
  {id:'settings',name:'الإعدادات',      desc:'مستخدمين وطاولات',  icon:'⚙️', page:'settings.html',     perm:'view_settings'},
];

requireAuth(async (user, userData) => {
  const isAdmin = user.uid === ADMIN_UID;
  const name = isAdmin ? 'Admin' : (userData?.name || user.email);
  const role = isAdmin ? 'أدمن — صلاحية كاملة' : (userData?.role || 'موظف');

  document.getElementById('user-name').textContent = name;
  document.getElementById('welcome-name').textContent = `أهلاً، ${name}`;
  document.getElementById('welcome-sub').textContent = role;

  // Inventory alerts (admin only)
  if (isAdmin) {
    try {
      const snap = await getDocs(collection(db, 'inventory'));
      const low = [];
      snap.forEach(d => {
        const it = d.data();
        if (it.type === 'counted' && it.qty <= it.alertQty) low.push(it.name);
      });
      if (low.length) {
        document.getElementById('notif-area').innerHTML =
          `<div class="notif-bar"><div class="notif-dot"></div><span>تنبيه المخزن: ${low.join('، ')} — على وشك الانتهاء</span></div>`;
      }
    } catch(e) {}
  }

  // Render sections
  const grid = document.getElementById('sections-grid');
  let hasLocked = false;
  grid.innerHTML = '';
  for (const sec of SECTIONS) {
    const allowed = isAdmin || (userData?.permissions?.[sec.perm] === true);
    if (!allowed) hasLocked = true;
    const card = document.createElement('div');
    card.className = 'sec-card' + (!allowed ? ' locked-sec' : '');
    card.innerHTML = `
      <div class="sec-icon">${sec.icon}</div>
      <div class="sec-name">${sec.name}</div>
      <div class="sec-desc">${sec.desc}</div>
      ${!allowed ? '<div class="locked-lbl">🔒 مقفول</div>' : ''}`;
    if (allowed) card.onclick = () => window.location.href = sec.page;
    grid.appendChild(card);
  }
  if (hasLocked) document.getElementById('locked-note').style.display = 'block';
});

window.doLogout = async function() {
  await signOut(auth);
  window.location.href = 'index.html';
}

setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('ar-EG', {weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
}, 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — التقفيل</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:700px;margin:0 auto;padding:20px 16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;border:0.5px solid var(--border);border-radius:10px;cursor:pointer;background:var(--bg2);color:var(--text2);font-family:'Cairo',sans-serif}
.tab.act{background:#1E3A8A;color:#fff;border-color:var(--accent)}
.page{display:none;flex-direction:column;gap:10px}
.page.act{display:flex}
.shift-badge{padding:12px 14px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;background:#1E3A8A;border:0.5px solid var(--accent)}
.sh-title{font-size:15px;font-weight:700;color:#fff}
.sh-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}
.kards{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.kard{background:var(--bg3);border-radius:10px;padding:10px;text-align:center}
.kl{font-size:10px;color:var(--text3);margin-bottom:3px}
.kv{font-size:15px;font-weight:700;color:var(--text1)}
.kv.g{color:#6EE7B7}.kv.r{color:#FCA5A5}.kv.b{color:#93C5FD}.kv.y{color:#FCD34D}
.exp-row{display:flex;justify-content:space-between;padding:6px 10px;background:var(--bg3);border-radius:9px;font-size:12px}
.actual-inp{width:100%;padding:12px;border:0.5px solid var(--border);border-radius:10px;font-size:24px;font-weight:700;text-align:center;background:var(--bg);color:var(--text1);direction:ltr;font-family:'Cairo',sans-serif}
.actual-inp:focus{outline:none;border-color:var(--accent)}
.diff-ok{padding:9px 12px;background:var(--green-bg);border:0.5px solid var(--green);border-radius:9px;display:flex;justify-content:space-between;font-size:13px;font-weight:700}
.diff-err{padding:9px 12px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:9px;display:flex;justify-content:space-between;font-size:13px;font-weight:700}
.close-btn{width:100%;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:4px}
.btn-blue{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.warn-bar{padding:9px 12px;background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:9px;font-size:11px;color:#FCD34D;display:flex;align-items:center;gap:7px}
.shift-sum{background:var(--bg3);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px}
.ss-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-bottom:5px;border-bottom:0.5px solid var(--border)}
.ss-name{font-size:13px;font-weight:700;color:var(--text1)}
.ss-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);padding:2px 0}
.emp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border:0.5px solid var(--border);border-radius:9px;background:var(--bg3)}
.att-btns{display:flex;gap:4px}
.ab{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-family:'Cairo',sans-serif}
.ab.P{background:var(--green-bg);border-color:var(--green);color:#6EE7B7}
.ab.A{background:var(--red-bg);border-color:var(--red);color:#FCA5A5}
.total-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1E3A8A;border:0.5px solid var(--accent);border-radius:12px}
/* رسيت */
.rcpt-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:16px}
.rcpt-box{background:#fff;width:260px;font-size:12px;color:#000;font-family:'Cairo',sans-serif}
.rcpt-box *{color:#000;font-family:'Cairo',sans-serif}
.rh{padding:12px 10px 8px;text-align:center;border-bottom:2px dashed #000}
.rh-name{font-size:16px;font-weight:900}
.rh-sub{font-size:9px;color:#444;margin-top:2px;font-weight:700}
.rh-type{font-size:11px;font-weight:900;margin-top:5px;border:1.5px solid #000;display:inline-block;padding:1px 12px;border-radius:20px}
.rm{padding:7px 10px;border-bottom:1px dashed #999}
.mr{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;font-weight:700}
.mr span:first-child{color:#444}
.rsec{padding:6px 10px;border-bottom:1px dashed #999}
.rsec-t{font-size:9px;font-weight:900;color:#222;letter-spacing:.4px;margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid #ccc}
.rrow{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;font-weight:700}
.rrow.bold{font-weight:900}
.rrow.ok{color:#1a7a3c}
.rrow.err{color:#c00}
.rtot{padding:9px 10px;display:flex;justify-content:space-between;font-size:14px;font-weight:900;border-top:2px solid #000;border-bottom:2px solid #000;margin:2px 0}
.rf{padding:8px 10px;text-align:center;font-size:10px;color:#444;line-height:1.8;font-weight:700}
.rf-brand{font-size:12px;font-weight:900;color:#000;margin-top:2px}
.rcpt-btns{display:flex;gap:8px}
@media print{
  @page{margin:0;size:80mm auto}
  html,body{width:79mm;margin:0;padding:0;background:#fff}
  body>*{display:none!important}
  .rcpt-overlay{display:block!important;position:static!important;width:79mm!important;background:#fff!important;padding:0!important;margin:0!important}
  .rcpt-btns{display:none!important}
  .rcpt-box{width:79mm!important;font-size:12px!important;font-weight:700!important;margin:0!important;padding:0!important;background:#fff!important;direction:rtl!important}
  .rcpt-box *{font-weight:700!important;color:#000!important}
  .rcpt-box .rh-name{font-size:16px!important;font-weight:900!important}
  .rcpt-box .rtot{font-size:15px!important;font-weight:900!important}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex"><div class="logo">C</div><div class="app-name">التقفيل</div></div>
  <div class="tb-flex">
    <div class="clock" id="clock"></div>
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div class="tabs">
    <div class="tab act" id="tab-shift" onclick="document.dispatchEvent(new CustomEvent('showtab',{detail:'shift'}))">تقفيل الشيفت</div>
    <div class="tab" id="tab-day" onclick="document.dispatchEvent(new CustomEvent('showtab',{detail:'day'}))">تقفيل اليوم</div>
  </div>
  <div class="page act" id="p-shift"><div style="text-align:center;padding:30px;color:var(--text3)">جاري التحميل...</div></div>
  <div class="page" id="p-day"></div>
</div>

<!-- receipts printed directly via thermalPrint -->

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, logTransaction, fmt,
  collection, getDocs, getDoc, setDoc, addDoc, updateDoc, doc, serverTimestamp, query, where } from './firebase.js';

const nowT = () => new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const dateStr = () => new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const todayKey = () => new Date().toISOString().split('T')[0];
const monthKey = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; };

let SHIFT=null, DATA={cash:0,elec:0,exps:[]}, EMPS=[], CLOSED_SHIFTS=[];
let currentUser='', isAdm=false, actualCash=0, currentUserPerms={};

document.addEventListener('showtab', e => showTab(e.detail));

window.showTab = function(t) {
  ['shift','day'].forEach(n => {
    document.getElementById('tab-'+n).classList.toggle('act', n===t);
    document.getElementById('p-'+n).classList.toggle('act', n===t);
  });
  if(t==='day') renderDay();
};

// ===== LOAD =====
async function loadCurrentShift() {
  SHIFT = null;
  try {
    const snap = await getDocs(collection(db,'shifts'));
    const today = todayKey();
    const all = [];
    snap.forEach(d => all.push({id:d.id,...d.data()}));
    const todayOpen = all.find(s => s.status==='open' && s.dayKey===today);
    const anyOpen = all.find(s => s.status==='open');
    SHIFT = todayOpen || anyOpen || null;
  } catch(e) {}
}

async function loadShiftData() {
  if(!SHIFT) return;
  try {
    const snap = await getDoc(doc(db,'shift_totals',SHIFT.shiftKey));
    if(snap.exists()){ DATA.cash=snap.data().cash||0; DATA.elec=snap.data().elec||0; }
    else { DATA.cash=0; DATA.elec=0; }
  } catch(e) { DATA.cash=0; DATA.elec=0; }
  try {
    const snap = await getDocs(collection(db,'daily_expenses'));
    DATA.exps=[];
    snap.forEach(d=>{ if(d.data().shiftKey===SHIFT.shiftKey) DATA.exps.push(d.data()); });
  } catch(e) { DATA.exps=[]; }
}

async function loadClosedShifts() {
  try {
    const snap = await getDocs(collection(db,'shifts'));
    CLOSED_SHIFTS=[];
    snap.forEach(d => {
      const s=d.data();
      // جيب كل الشيفتات المقفلة اللي لسه محتاجة تقفيل يوم (بغض النظر عن التاريخ)
      if(s.status==='closed' && !s.dayClosedAt)
        CLOSED_SHIFTS.push({id:d.id,...s});
    });
    CLOSED_SHIFTS.sort((a,b)=>a.startTime>b.startTime?1:-1);
  } catch(e) { CLOSED_SHIFTS=[]; }
}

async function loadEmps() {
  try {
    const snap = await getDocs(collection(db,'employees'));
    EMPS=[];
    snap.forEach(d => EMPS.push({id:d.id,...d.data(),present:false}));
  } catch(e) { EMPS=[]; }
}

const totExp = () => DATA.exps.reduce((s,e)=>s+(e.amt||0),0);
const totInc = () => DATA.cash + DATA.elec;
const expected = () => DATA.cash - totExp(); // المفروض في الإيد = نقدي - مصاريف

// ===== RENDER SHIFT =====
function renderShift() {
  const p = document.getElementById('p-shift');
  if(!SHIFT){
    p.innerHTML=`<div style="text-align:center;padding:30px">
      <div style="font-size:36px;margin-bottom:12px">✓</div>
      <div style="font-size:15px;font-weight:700;color:var(--text1);margin-bottom:6px">مفيش شيفت مفتوح</div>
      <div style="font-size:12px;color:var(--text3)">كل الشيفتات اتقفلت</div>
    </div>`;
    return;
  }

  const isOldShift = SHIFT.dayKey !== todayKey();
  const canCloseShift   = isAdm || (currentUserPerms?.['close.save']===true);
  const canSeeSales     = isAdm || (currentUserPerms?.['close.see_sales']===true);
  const canActualCash   = isAdm || (currentUserPerms?.['close.actual_cash']===true);
  const canSeeDiff      = isAdm || (currentUserPerms?.['close.see_diff']===true);
  const canAttend       = isAdm || (currentUserPerms?.['close.attend']===true);
  const expAmt = totExp();
  const expRows = DATA.exps.length
    ? DATA.exps.map(e=>`<div class="exp-row"><span style="color:var(--text2)">${e.cat||e.name||'—'}</span><span style="font-weight:700;color:#FCA5A5">${fmt(e.amt)}</span></div>`).join('')
    : '<div style="text-align:center;font-size:12px;color:var(--text3);padding:6px">لا يوجد مصاريف</div>';

  // الأدمن أو من عنده صلاحية يشوف المبيعات
  const adminSection = canSeeSales ? `
    <div class="sec-lbl">المبيعات</div>
    <div class="kards">
      <div class="kard"><div class="kl">نقدي</div><div class="kv g">${fmt(DATA.cash)}</div></div>
      <div class="kard"><div class="kl">إلكتروني</div><div class="kv b">${fmt(DATA.elec)}</div></div>
      <div class="kard"><div class="kl">مصاريف</div><div class="kv r">${fmt(expAmt)}</div></div>
      <div class="kard"><div class="kl">المفروض في الإيد</div><div class="kv y">${fmt(expected())}</div></div>
    </div>` : '';

  p.innerHTML=`
    ${isOldShift?`<div class="warn-bar"><div class="notif-dot"></div>⚠ الشيفت ده من يوم ${SHIFT.startDate||SHIFT.dayKey} — سيبته مفتوح من قديم!</div>`:''}
    <div class="shift-badge">
      <div>
        <div class="sh-title">شيفت ${SHIFT.type||'—'}</div>
        <div class="sh-sub">بدأ ${SHIFT.startTime||''} — ${SHIFT.startDate||''}</div>
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,0.8)" id="live-clk"></div>
    </div>
    ${adminSection}
    <div class="sec-lbl">المصاريف</div>
    <div class="card">
      <div class="card-body" style="gap:6px">${expRows}</div>
    </div>
    ${canActualCash ? `
    <div class="sec-lbl">الخزينة الفعلية في الإيد</div>
    <input class="actual-inp" id="actual-inp" type="text" inputmode="decimal" placeholder="0.00"
      oninput="calcDiff(this.value)" onchange="calcDiff(this.value)">
    <div id="diff-box"></div>` : ''}
    ${isAdm?'':``}
    <div style="padding:8px 10px;background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:9px;font-size:11px;color:#FCD34D">
      بعد التقفيل — شيفت جديد هيفتح تلقائي
    </div>
    ${canCloseShift
      ? `<button class="close-btn btn-blue" onclick="closeShift()">تقفيل الشيفت</button>`
      : `<div style="padding:9px 12px;background:var(--bg3);border:0.5px solid var(--border);border-radius:9px;font-size:12px;color:var(--text3);text-align:center">ليس لديك صلاحية تقفيل الشيفت</div>`
    }`;
}

window.calcDiff = function(v){
  const val = parseFloat(v.replace(',','.')||0);
  actualCash = val;
  const box = document.getElementById('diff-box');
  if(!box) return;
  // بس الأدمن أو من عنده صلاحية يشوف الفرق
  const canDiff = isAdm || (currentUserPerms?.['close.see_diff']===true);
  if(!canDiff){ box.innerHTML=''; return; }
  const exp = expected();
  const diff = val - exp;
  if(!v){ box.innerHTML=''; return; }
  if(Math.abs(diff)<0.01){
    box.innerHTML=`<div class="diff-ok"><span style="color:#6EE7B7">✓ تمام — الخزينة صح</span><span style="color:#6EE7B7;font-weight:900">${fmt(val)}</span></div>`;
  } else if(diff>0){
    box.innerHTML=`<div class="diff-ok"><span style="color:#6EE7B7">زيادة</span><span style="color:#6EE7B7;font-weight:900">+ ${fmt(diff)}</span></div>`;
  } else {
    box.innerHTML=`<div class="diff-err"><span style="color:#FCA5A5">عجز</span><span style="color:#FCA5A5;font-weight:900">− ${fmt(Math.abs(diff))}</span></div>`;
  }
};

// ===== CLOSE SHIFT =====
let _closingShift=false;
window.closeShift = async function() {
  if(!SHIFT) return;
  if(_closingShift) return;
  const canClose = isAdm || (currentUserPerms?.['close.save']===true);
  if(!canClose) return alert('ليس لديك صلاحية تقفيل الشيفت');
  _closingShift=true;
  const btn=document.querySelector('.close-btn.btn-blue');
  if(btn){btn.textContent='جاري التقفيل...';btn.style.opacity='0.6';btn.disabled=true;}
  try{
  const actual = parseFloat(document.getElementById('actual-inp')?.value?.replace(',','.')||0);
  if(!actual && actual!==0) return alert('اكتب الخزينة الفعلية في الإيد');

  // تحقق من الطاولات المفتوحة — تنبيه بس مش منع
  let openTables = [];
  try {
    const snap = await getDocs(collection(db,'tables'));
    snap.forEach(d=>{ if(d.data().busy) openTables.push(d.data().name); });
  } catch(e){}

  if(openTables.length){
    if(!confirm(`تنبيه: في ${openTables.length} طاولة مفتوحة (${openTables.join('، ')}) — مش محسوبة في الشيفت ده.\nكمل التقفيل؟`)) return;
  }

  const exp = expected();
  const diff = actual - exp;
  const cash = DATA.cash, elec = DATA.elec, exps = totExp(), net = totInc() - exps;

  try {
    await updateDoc(doc(db,'shifts',SHIFT.id),{
      status:'closed', endTime:nowT(), endDate:dateStr(),
      cash, elec, totalIncome:totInc(), totalExp:exps, netShift:net,
      actualCash:actual, cashDiff:diff, closedBy:currentUser
    });
  } catch(e){}

  // حفظ في daily_closing
  try {
    const dk = SHIFT.dayKey || todayKey();
    const ref = doc(db,'daily_closing',dk);
    const snap = await getDoc(ref);
    const shiftData = {
      type:SHIFT.type||'—', cash, elec, net, totalExp:exps,
      actualCash:actual, cashDiff:diff,
      closedBy:currentUser, time:nowT(),
      exps: DATA.exps.map(e=>({cat:e.cat||e.name||'—',amt:e.amt||0}))
    };
    if(snap.exists()){
      const prev=snap.data();
      await updateDoc(ref,{
        cash:(prev.cash||0)+cash, elec:(prev.elec||0)+elec,
        totalIncome:(prev.totalIncome||0)+totInc(),
        totalExp:(prev.totalExp||0)+exps,
        netDay:(prev.netDay||0)+net,
        shifts:[...(prev.shifts||[]), shiftData]
      });
    } else {
      await setDoc(ref,{
        date:SHIFT.startDate||dateStr(), dayKey:dk, monthKey:monthKey(),
        cash, elec, totalIncome:totInc(), totalExp:exps, netDay:net,
        shifts:[shiftData], timestamp:serverTimestamp()
      });
    }
  } catch(e){}

  // أرشفة المصاريف
  try {
    const expSnap = await getDocs(collection(db,'daily_expenses'));
    for(const d of expSnap.docs){
      if(d.data().shiftKey===SHIFT.shiftKey)
        await updateDoc(doc(db,'daily_expenses',d.id),{archived:true});
    }
  } catch(e){}

  await logTransaction('تقفيل شيفت '+(SHIFT.type||''), fmt(net)+' صافي', 'close');

  // رسيت الشيفت
  showShiftReceipt(cash, elec, exps, net, actual, diff, DATA.exps);
  }catch(err){
    alert('حصل خطأ أثناء التقفيل — حاول تاني');
    console.error(err);
    const btn=document.querySelector('.close-btn.btn-blue');
    if(btn){btn.textContent='تقفيل الشيفت';btn.style.opacity='1';btn.disabled=false;}
  }finally{
    _closingShift=false;
  }

  // فتح شيفت جديد
  const nextDayKey = todayKey();
  const nextShiftKey = nextDayKey+'_'+Date.now();
  const nextType = SHIFT.type==='صبح'?'مسا':'صبح';
  try {
    await addDoc(collection(db,'shifts'),{
      type:nextType, status:'open',
      dayKey:nextDayKey, shiftKey:nextShiftKey,
      startTime:nowT(), startDate:dateStr(),
      timestamp:serverTimestamp()
    });
    await setDoc(doc(db,'shift_totals',nextShiftKey),{
      cash:0, elec:0, total:0, date:dateStr(), dayKey:nextDayKey, shiftKey:nextShiftKey
    });
  } catch(e){}
};

// ===== SHIFT RECEIPT =====
function showShiftReceipt(cash, elec, exps, net, actual, diff, expsList){
  const html = buildShiftReceiptHTML(
    cash, elec, exps, net, actual, diff, expsList,
    SHIFT?.type||'—', SHIFT?.startTime||'—', SHIFT?.startDate||'—', currentUser
  );
  thermalPrint(html);
}

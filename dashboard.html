<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — الداشبورد</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Cairo',sans-serif;background:#F8FAFC;min-height:100vh;direction:rtl}
  .topbar{padding:12px 20px;background:#fff;border-bottom:0.5px solid #E2E8F0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .tb-left{display:flex;align-items:center;gap:10px}
  .logo{width:36px;height:36px;background:linear-gradient(135deg,#1E3A8A,#3B82F6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
  .app-name{font-size:15px;font-weight:700;color:#0F172A}
  .tb-right{display:flex;align-items:center;gap:10px}
  .user-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;background:#F1F5F9;border-radius:20px;font-size:12px;color:#475569}
  .user-dot{width:8px;height:8px;border-radius:50%;background:#1D9E75}
  .logout-btn{padding:6px 14px;background:#FEF2F2;border:0.5px solid #FECACA;border-radius:8px;font-size:12px;color:#DC2626;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:500}
  .logout-btn:hover{background:#FEE2E2}
  .main{max-width:900px;margin:0 auto;padding:24px 16px}
  .welcome{margin-bottom:24px}
  .welcome-name{font-size:22px;font-weight:700;color:#0F172A}
  .welcome-sub{font-size:13px;color:#64748B;margin-top:3px}
  .notif-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#FEF2F2;border:0.5px solid #FECACA;border-radius:12px;margin-bottom:20px;font-size:12px;color:#991B1B}
  .notif-dot{width:8px;height:8px;border-radius:50%;background:#DC2626;flex-shrink:0;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sec-lbl{font-size:12px;font-weight:600;color:#64748B;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
  .sections-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  @media(max-width:600px){.sections-grid{grid-template-columns:repeat(2,1fr)}}
  .sec-card{background:#fff;border:0.5px solid #E2E8F0;border-radius:16px;padding:16px 14px;cursor:pointer;transition:all .15s;text-align:center}
  .sec-card:hover{border-color:#3B82F6;box-shadow:0 4px 16px rgba(59,130,246,0.1);transform:translateY(-1px)}
  .sec-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:20px}
  .sec-name{font-size:13px;font-weight:600;color:#0F172A}
  .sec-desc{font-size:11px;color:#94A3B8;margin-top:2px}
  .locked-note{padding:10px 14px;background:#F8FAFC;border:0.5px solid #E2E8F0;border-radius:12px;font-size:12px;color:#64748B;margin-bottom:16px}
  .locked-sec{opacity:.4;cursor:not-allowed;pointer-events:none}
  .locked-sec:hover{transform:none;box-shadow:none}
  .locked-label{font-size:10px;color:#94A3B8;margin-top:4px}
  .clock{font-size:12px;color:#64748B}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <div class="logo">C</div>
    <div class="app-name">Camp Game Zone</div>
  </div>
  <div class="tb-right">
    <div class="clock" id="clock"></div>
    <div class="user-chip">
      <div class="user-dot"></div>
      <span id="user-name">...</span>
    </div>
    <div class="logout-btn" onclick="doLogout()">خروج</div>
  </div>
</div>

<div class="main">
  <div class="welcome">
    <div class="welcome-name" id="welcome-name">أهلاً...</div>
    <div class="welcome-sub" id="welcome-sub">جاري التحميل...</div>
  </div>

  <div id="notif-area"></div>
  <div id="locked-note" style="display:none" class="locked-note">بعض الأقسام مقفولة — تواصل مع الأدمن لفتح صلاحيات إضافية</div>

  <div class="sec-lbl">الأقسام</div>
  <div class="sections-grid" id="sections-grid"></div>
</div>

<script type="module">
import { auth, db, ADMIN_UID, requireAuth, signOut, collection, getDocs, query, where } from './firebase.js';

const SECTIONS = [
  { id: 'pos',      name: 'نقطة البيع',       desc: 'POS — البيع الحالي',      icon: '🖥',  color: '#EFF6FF', page: 'pos.html',          perm: 'view_tables' },
  { id: 'emp',      name: 'الموظفين',          desc: 'مرتبات وسحوبات',          icon: '👥',  color: '#FFFBEB', page: 'employees.html',    perm: 'view_emp' },
  { id: 'exp',      name: 'المصاريف',          desc: 'يومية وشهرية',            icon: '💸',  color: '#FFF1F2', page: 'expenses.html',     perm: 'view_exp' },
  { id: 'inv',      name: 'المخزن',            desc: 'أصناف وكميات',            icon: '📦',  color: '#F0FDF4', page: 'inventory.html',    perm: 'view_inv' },
  { id: 'rep',      name: 'التقارير',          desc: 'يومي وشهري',              icon: '📊',  color: '#F0FDF4', page: 'reports.html',      perm: 'view_rep' },
  { id: 'close',    name: 'التقفيل اليومي',    desc: 'ملخص اليوم',              icon: '🔒',  color: '#F5F3FF', page: 'closing.html',      perm: 'view_close' },
  { id: 'trans',    name: 'المعاملات',         desc: 'سجل الأكشن',              icon: '📋',  color: '#EFF6FF', page: 'transactions.html', perm: 'view_rep' },
  { id: 'settings', name: 'الإعدادات',         desc: 'مستخدمين وتصنيفات',       icon: '⚙️', color: '#F8FAFC', page: 'settings.html',     perm: 'view_settings' },
];

requireAuth(async (user, userData) => {
  const isAdmin = user.uid === ADMIN_UID;
  const name = isAdmin ? 'Admin' : (userData?.name || user.email);
  const role = isAdmin ? 'أدمن — صلاحية كاملة' : (userData?.role || 'موظف');

  document.getElementById('user-name').textContent = name;
  document.getElementById('welcome-name').textContent = `أهلاً، ${name}`;
  document.getElementById('welcome-sub').textContent = role;

  // Check inventory alerts
  if (isAdmin) {
    try {
      const snap = await getDocs(collection(db, 'inventory'));
      const lowItems = [];
      snap.forEach(d => {
        const item = d.data();
        if (item.type === 'counted' && item.qty <= item.alertQty) {
          lowItems.push(item.name);
        }
      });
      if (lowItems.length > 0) {
        document.getElementById('notif-area').innerHTML = `
          <div class="notif-bar">
            <div class="notif-dot"></div>
            <span>تنبيه المخزن: ${lowItems.join('، ')} — على وشك الانتهاء</span>
          </div>`;
      }
    } catch(e) {}
  }

  // Render sections
  const grid = document.getElementById('sections-grid');
  let hasLocked = false;
  grid.innerHTML = '';

  for (const sec of SECTIONS) {
    const allowed = isAdmin || (userData?.permissions?.[sec.perm] === true);
    if (!allowed) hasLocked = true;

    const card = document.createElement('div');
    card.className = 'sec-card' + (!allowed ? ' locked-sec' : '');
    card.innerHTML = `
      <div class="sec-icon" style="background:${sec.color}">${sec.icon}</div>
      <div class="sec-name">${sec.name}</div>
      <div class="sec-desc">${sec.desc}</div>
      ${!allowed ? '<div class="locked-label">🔒 مقفول</div>' : ''}
    `;
    if (allowed) card.onclick = () => window.location.href = sec.page;
    grid.appendChild(card);
  }

  if (hasLocked) document.getElementById('locked-note').style.display = 'block';
});

window.doLogout = async function() {
  await signOut(auth);
  window.location.href = 'index.html';
}

// Clock
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-EG', { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}, 1000);
</script>
</body>
</html>

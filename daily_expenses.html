<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — المصاريف اليومية</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:800px;margin:0 auto;padding:20px 16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.chip{display:inline-block;padding:3px 12px;background:#1E3A8A;border:0.5px solid var(--accent);border-radius:20px;font-size:11px;color:#93C5FD;font-weight:500}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.cb-ndf{background:#064E3B;color:#6EE7B7}
.cb-mst{background:#1E3A8A;color:#93C5FD}
.cb-emp{background:#451A03;color:#FCD34D}
.cb-sna{background:#2E1065;color:#C4B5FD}
.cb-oth{background:var(--bg3);color:var(--text2)}
.del-btn{padding:3px 9px;background:var(--red-bg);border:0.5px solid var(--red);border-radius:7px;font-size:10px;cursor:pointer;color:#FCA5A5;font-family:'Cairo',sans-serif}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex">
    <div class="logo">C</div>
    <div class="app-name">المصاريف اليومية</div>
  </div>
  <div class="tb-flex">
    <div class="chip" id="today-chip"></div>
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main">
  <div class="card" style="margin-bottom:14px">
    <div class="card-head">إضافة مصروف — اليوم</div>
    <div class="card-body">
      <div class="form-grid">
        <div>
          <div class="fl">التصنيف</div>
          <select class="fsel" id="d-cat">
            <option value="نظافة">نظافة</option>
            <option value="مستلزمات">مستلزمات</option>
            <option value="طعام وشراب">طعام وشراب</option>
            <option value="صيانة">صيانة</option>
            <option value="أخرى">أخرى</option>
          </select>
        </div>
        <div>
          <div class="fl">المبلغ (ج)</div>
          <input class="finp" id="d-amt" type="text" inputmode="decimal" placeholder="0">
        </div>
        <div style="grid-column:1/-1">
          <div class="fl">ملاحظة (اختياري)</div>
          <input class="finp" id="d-note" placeholder="أي تفاصيل...">
        </div>
        <div style="grid-column:1/-1">
          <button class="btn-primary-full" onclick="addExpense()">+ إضافة</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tbl-wrap">
    <table class="dtbl">
      <thead><tr>
        <th style="width:120px">التصنيف</th>
        <th style="width:80px">المبلغ</th>
        <th style="width:80px">الوقت</th>
        <th>ملاحظة</th>
        <th style="width:50px">حذف</th>
      </tr></thead>
      <tbody id="exp-body"></tbody>
    </table>
  </div>

  <div class="sum-bar" style="margin-top:10px">
    <span style="font-size:12px;color:var(--text2)">إجمالي مصاريف اليوم</span>
    <span style="font-size:16px;font-weight:700;color:#FCA5A5" id="exp-total">0.00 ج</span>
  </div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, hasPermission, logTransaction, fmt,
  collection, getDocs, addDoc, deleteDoc, updateDoc, doc, serverTimestamp } from './firebase.js';

const CAT_CLASS = {
  'نظافة':'cb-ndf','مستلزمات':'cb-mst','طعام وشراب':'cb-ndf',
  'صيانة':'cb-sna','أخرى':'cb-oth'
};
const getCatClass = c => c.startsWith('سحب') ? 'cb-emp' : (CAT_CLASS[c]||'cb-oth');
const nowT = () => new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const dateStr = () => new Date().toLocaleDateString('ar-EG');
const todayKey = () => new Date().toISOString().split('T')[0];

let EXPS=[], canAdd=false, canDel=false;

async function loadExpenses(){
  try{
    // Get current open shift key
    const currentShiftKey = await getCurrentShiftKey();
    const snap=await getDocs(collection(db,'daily_expenses'));
    EXPS=[];
    snap.forEach(d=>{
      const data=d.data();
      // Show only expenses belonging to current open shift
      if(data.shiftKey===currentShiftKey) EXPS.push({id:d.id,...data});
    });
    EXPS.sort((a,b)=>((b.timestamp?.seconds||0)-(a.timestamp?.seconds||0)));
  }catch(e){ EXPS=[]; }
}

function renderTable(){
  document.getElementById('today-chip').textContent=dateStr();
  const b=document.getElementById('exp-body');
  b.innerHTML=EXPS.length?EXPS.map(i=>`
    <tr>
      <td><span class="cat-badge ${getCatClass(i.cat)}">${i.cat}</span></td>
      <td style="font-weight:700;color:#FCA5A5">${fmt(i.amt)}</td>
      <td style="font-size:10px;color:var(--text3)">${i.time||''}</td>
      <td style="font-size:10px;color:var(--text3)">${i.note||'—'}</td>
      <td>${canDel?`<div class="del-btn" onclick="delExp('${i.id}')">حذف</div>`:'—'}</td>
    </tr>`).join('')
  :'<tr><td colspan="5" style="text-align:center;padding:16px;color:var(--text3)">لا يوجد مصاريف اليوم</td></tr>';
  document.getElementById('exp-total').textContent=fmt(EXPS.reduce((s,i)=>s+i.amt,0));
}

window.addExpense=async function(){
  if(!canAdd) return alert('ليس لديك صلاحية');
  const cat=document.getElementById('d-cat').value;
  const amt=parseFloat(document.getElementById('d-amt').value.replace(',','.')||0);
  const note=document.getElementById('d-note').value.trim();
  if(!amt||amt<=0) return alert('اكتب مبلغ صح');
  const sk=await getCurrentShiftKey();
  try{
    const ref=await addDoc(collection(db,'daily_expenses'),{
      cat,amt,note,time:nowT(),dayKey:todayKey(),date:dateStr(),
      timestamp:serverTimestamp(),shiftKey:sk
    });
    EXPS.unshift({id:ref.id,cat,amt,note,time:nowT()});
    logTransaction(`إضافة مصروف: ${cat}`,`${fmt(amt)}`,'exp');

    // لو التصنيف سحب موظف — سجله تلقائي في سحوباته
    if(cat.startsWith('سحب ')){
      const empName=cat.replace('سحب ','').trim();
      try{
        const empSnap=await getDocs(collection(db,'employees'));
        for(const d of empSnap.docs){
          if(d.data().name===empName){
            const draws=d.data().draws||[];
            draws.push({date:dateStr(),amt,note:note||'سحب تلقائي من المصاريف'});
            await updateDoc(doc(db,'employees',d.id),{draws});
            break;
          }
        }
      }catch(er){}
    }

    document.getElementById('d-amt').value='';
    document.getElementById('d-note').value='';
    renderTable();
  }catch(e){ alert('حصل خطأ'); }
};

window.delExp=async function(id){
  if(!canDel) return;
  try{
    await deleteDoc(doc(db,'daily_expenses',id));
    EXPS=EXPS.filter(i=>i.id!==id);
    logTransaction('حذف مصروف يومي','','exp');
    renderTable();
  }catch(e){ alert('حصل خطأ'); }
};

async function getCurrentShiftKey(){
  try{
    const today=new Date().toISOString().split('T')[0];
    const snap=await getDocs(collection(db,'shifts'));
    let sk=null;
    snap.forEach(d=>{
      const s=d.data();
      if(s.status==='open'&&s.dayKey===today) sk=s.shiftKey;
    });
    return sk||today;
  }catch(e){return new Date().toISOString().split('T')[0];}
}

requireAuth(async(user,userData)=>{
  const isAdm=user.uid===ADMIN_UID;
  const p=userData?.permissions||{};
  canAdd=isAdm||p['exp.add_daily']===true;
  canDel=isAdm||p['exp.del_daily']===true;
  if(!isAdm&&!p['exp.view_daily']&&!p['exp.add_daily']){window.location.href='dashboard.html';return;}
  document.getElementById('uname').textContent=isAdm?'Admin':(userData?.name||user.email);
  // Load employee cats
  try{
    const empSnap=await getDocs(collection(db,'employees'));
    const sel=document.getElementById('d-cat');
    empSnap.forEach(d=>{
      const opt=document.createElement('option');
      opt.value=`سحب ${d.data().name}`;
      opt.textContent=`سحب ${d.data().name}`;
      sel.appendChild(opt);
    });
  }catch(e){}
  await loadExpenses();
  renderTable();
});
</script>
</body>
</html>

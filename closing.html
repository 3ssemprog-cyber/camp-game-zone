<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Game Zone — التقفيل</title>
<link rel="stylesheet" href="theme.css">
<style>
.main{max-width:700px;margin:0 auto;padding:20px 16px}
.tb-flex{display:flex;align-items:center;gap:8px}
.shift-header{padding:14px 16px;border-radius:14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.sh-morning{background:#1E3A8A;border:0.5px solid var(--accent)}
.sh-evening{background:#2E1065;border:0.5px solid var(--purple)}
.sh-none{background:var(--bg3);border:0.5px solid var(--border)}
.sh-title{font-size:16px;font-weight:700;color:#fff}
.sh-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:3px}
.sh-time{font-size:12px;color:rgba(255,255,255,0.8);font-weight:600}
.kards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kard{border-radius:10px;padding:11px 10px;text-align:center;border:0.5px solid}
.kl{font-size:10px;margin-bottom:4px}
.kv{font-size:16px;font-weight:700}
.k-cash{background:#064E3B;border-color:var(--green)}.k-cash .kl{color:#6EE7B7}.k-cash .kv{color:#6EE7B7}
.k-elec{background:#1E3A8A;border-color:var(--accent)}.k-elec .kl{color:#93C5FD}.k-elec .kv{color:#93C5FD}
.k-exp{background:var(--red-bg);border-color:var(--red)}.k-exp .kl{color:#FCA5A5}.k-exp .kv{color:#FCA5A5}
.k-net{background:#2E1065;border-color:var(--purple)}.k-net .kl{color:#C4B5FD}.k-net .kv{color:#C4B5FD}
.exp-row{display:flex;justify-content:space-between;padding:6px 10px;background:var(--bg3);border-radius:9px;font-size:12px;margin-bottom:5px}
.emp-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border:0.5px solid var(--border);border-radius:9px;background:var(--bg3)}
.emp-row.P{background:#064E3B;border-color:var(--green)}
.ab{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:0.5px solid var(--border);background:var(--bg2);color:var(--text2);font-family:'Cairo',sans-serif}
.ab.P{background:#064E3B;border-color:var(--green);color:#6EE7B7}
.ab.A{background:var(--red-bg);border-color:var(--red);color:#FCA5A5}
.close-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cairo',sans-serif;margin-top:8px}
.close-btn.evening{background:#7C3AED}
.no-shift{text-align:center;padding:40px 20px}
.ns-icon{font-size:40px;margin-bottom:12px}
.ns-title{font-size:16px;font-weight:700;color:var(--text1);margin-bottom:6px}
.ns-sub{font-size:12px;color:var(--text3)}
/* Receipt */
.rcpt-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;padding:16px}
.rcpt-box{background:#fff;width:260px;font-size:12px;color:#000;font-family:'Cairo',sans-serif}
.rcpt-box *{color:#000;font-family:'Cairo',sans-serif}
.rh{padding:14px 12px 10px;text-align:center;border-bottom:2px dashed #000}
.rh-name{font-size:17px;font-weight:900}
.rh-sub{font-size:9px;color:#555;margin-top:2px}
.rh-type{font-size:11px;font-weight:700;margin-top:5px;border:1px solid #000;display:inline-block;padding:1px 12px;border-radius:20px}
.rm{padding:8px 12px;border-bottom:1px dashed #999}
.mr{display:flex;justify-content:space-between;font-size:10px;padding:1px 0}
.mr span:first-child{color:#555}
.mr span:last-child{font-weight:700}
.rsection{padding:8px 12px;border-bottom:1px dashed #999}
.rsec-title{font-size:10px;font-weight:700;color:#555;letter-spacing:.5px;margin-bottom:5px;border-bottom:1px solid #eee;padding-bottom:3px}
.rrow{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.rrow.bold{font-weight:700}
.rtotal{padding:10px 12px;border-bottom:2px dashed #000}
.rtotal-row{display:flex;justify-content:space-between;font-size:14px;font-weight:900}
.rf{padding:10px 12px;text-align:center;font-size:10px;color:#555;line-height:1.8}
.rf-dots{letter-spacing:3px;margin-bottom:4px}
.rf-brand{font-size:13px;font-weight:900;color:#000;margin-top:3px}
.rcpt-btns{display:flex;gap:8px}
@media print{
  body>*:not(.rcpt-overlay){display:none!important}
  .rcpt-overlay{display:flex!important;position:static!important;background:#fff!important;padding:0!important}
  .rcpt-btns{display:none!important}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-flex"><div class="logo">C</div><div class="app-name">التقفيل</div></div>
  <div class="tb-flex">
    <div class="clock" id="clock"></div>
    <div class="user-chip"><div class="user-dot"></div><span id="uname">...</span></div>
    <div class="logout-btn" onclick="window.location.href='dashboard.html'">رجوع</div>
  </div>
</div>

<div class="main" id="main-content"></div>

<!-- Receipt -->
<div id="rcpt-view" class="rcpt-overlay">
  <div class="rcpt-box" id="rcpt-content"></div>
  <div class="rcpt-btns">
    <button onclick="closeReceipt()" style="padding:8px 20px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border);border-radius:9px;cursor:pointer;font-family:'Cairo',sans-serif">رجوع</button>
    <button onclick="window.print()" style="padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:9px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700">طباعة</button>
  </div>
</div>

<script type="module">
import { db, auth, ADMIN_UID, requireAuth, logTransaction, fmt,
  collection, getDocs, getDoc, setDoc, addDoc, updateDoc, doc, serverTimestamp } from './firebase.js';

const nowT=()=>new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
const dateStr=()=>new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const todayKey=()=>new Date().toISOString().split('T')[0];
const monthKey=()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`};

let CURRENT_SHIFT=null, EMPS=[], DATA={cash:0,elec:0,dailyExps:[]}, currentUser='';

// ===== LOAD CURRENT SHIFT =====
async function loadCurrentShift(){
  try{
    const snap=await getDocs(collection(db,'shifts'));
    CURRENT_SHIFT=null;
    snap.forEach(d=>{
      const s=d.data();
      if(s.status==='open') CURRENT_SHIFT={id:d.id,...s};
    });
  }catch(e){CURRENT_SHIFT=null;}
}

// ===== LOAD SHIFT DATA =====
async function loadShiftData(){
  if(!CURRENT_SHIFT)return;
  const shiftKey=CURRENT_SHIFT.shiftKey;
  // Totals from daily_totals
  try{
    const snap=await getDoc(doc(db,'daily_totals',shiftKey));
    if(snap.exists()){
      DATA.cash=snap.data().cash||0;
      DATA.elec=snap.data().elec||0;
    }else{DATA.cash=0;DATA.elec=0;}
  }catch(e){DATA.cash=0;DATA.elec=0;}
  // Expenses for this shift
  try{
    const snap=await getDocs(collection(db,'daily_expenses'));
    DATA.dailyExps=[];
    snap.forEach(d=>{
      const exp=d.data();
      if(exp.shiftKey===shiftKey||exp.dayKey===CURRENT_SHIFT.dayKey)
        DATA.dailyExps.push(exp);
    });
  }catch(e){DATA.dailyExps=[];}
  // Employees
  try{
    const snap=await getDocs(collection(db,'employees'));
    EMPS=[];
    snap.forEach(d=>EMPS.push({id:d.id,...d.data(),present:false}));
  }catch(e){EMPS=[];}
}

function totExp(){return DATA.dailyExps.reduce((s,e)=>s+(e.amt||0),0);}
function totIncome(){return DATA.cash+DATA.elec;}
function netShift(){return totIncome()-totExp();}

// ===== CREATE NEXT SHIFT =====
async function createNextShift(currentType, currentDayKey){
  const nextType=currentType==='صبح'?'مسا':'صبح';
  // If next is morning, it's a new day (use current real date)
  const nextDayKey=todayKey();
  const nextShiftKey=`${nextDayKey}_${nextType}`;
  try{
    await addDoc(collection(db,'shifts'),{
      type:nextType,
      status:'open',
      dayKey:nextDayKey,
      shiftKey:nextShiftKey,
      startTime:nowT(),
      startDate:dateStr(),
      timestamp:serverTimestamp()
    });
  }catch(e){}
}

// ===== CLOSE SHIFT =====
window.closeShift=async function(){
  if(!CURRENT_SHIFT)return;
  // Check open tables
  try{
    const tablesSnap=await getDocs(collection(db,'tables'));
    const openTables=[];
    tablesSnap.forEach(d=>{if(d.data().busy)openTables.push(d.data().name);});
    if(openTables.length>0){
      alert('⚠ في طاولات مفتوحة:\n'+openTables.join('\n')+'\n\nقفل الطاولات الأول');
      return;
    }
  }catch(e){}

  const note=document.getElementById('close-note')?.value||'';
  const presentEmps=EMPS.filter(e=>e.present);

  // Add attendance to present employees
  for(const emp of presentEmps){
    try{await updateDoc(doc(db,'employees',emp.id),{days:(emp.days||0)+1});}catch(e){}
  }

  // Close current shift
  try{
    await updateDoc(doc(db,'shifts',CURRENT_SHIFT.id),{
      status:'closed',
      endTime:nowT(),
      endDate:dateStr(),
      cash:DATA.cash,
      elec:DATA.elec,
      totalIncome:totIncome(),
      totalExp:totExp(),
      netShift:netShift(),
      presentEmps:presentEmps.map(e=>e.name),
      closedBy:currentUser,
      note
    });
  }catch(e){}

  // Save to daily_closing (accumulate per day)
  try{
    const dayClosingRef=doc(db,'daily_closing',CURRENT_SHIFT.dayKey);
    const dayClosingSnap=await getDoc(dayClosingRef);
    if(dayClosingSnap.exists()){
      const prev=dayClosingSnap.data();
      await updateDoc(dayClosingRef,{
        cash:(prev.cash||0)+DATA.cash,
        elec:(prev.elec||0)+DATA.elec,
        totalIncome:(prev.totalIncome||0)+totIncome(),
        totalExp:(prev.totalExp||0)+totExp(),
        netDay:(prev.netDay||0)+netShift(),
        shifts:[...(prev.shifts||[]),{type:CURRENT_SHIFT.type,cash:DATA.cash,elec:DATA.elec,net:netShift(),closedBy:currentUser}]
      });
    }else{
      await setDoc(dayClosingRef,{
        date:CURRENT_SHIFT.startDate||dateStr(),
        dayKey:CURRENT_SHIFT.dayKey,
        monthKey:monthKey(),
        cash:DATA.cash,elec:DATA.elec,
        totalIncome:totIncome(),totalExp:totExp(),netDay:netShift(),
        shifts:[{type:CURRENT_SHIFT.type,cash:DATA.cash,elec:DATA.elec,net:netShift(),closedBy:currentUser}],
        timestamp:serverTimestamp()
      });
    }
  }catch(e){}

  await logTransaction(`تقفيل شيفت ${CURRENT_SHIFT.type}`,`${fmt(netShift())} صافي`,'close');

  // Show receipt
  showReceipt(CURRENT_SHIFT, DATA, EMPS, currentUser, note);

  // Create next shift automatically
  await createNextShift(CURRENT_SHIFT.type, CURRENT_SHIFT.dayKey);
  await loadCurrentShift();
};

// ===== RENDER =====
function render(){
  const mc=document.getElementById('main-content');
  if(!CURRENT_SHIFT){
    mc.innerHTML=`
      <div class="no-shift">
        <div class="ns-icon">🔄</div>
        <div class="ns-title">جاري تحميل الشيفت...</div>
        <div class="ns-sub">لو استمرت المشكلة اتصل بالأدمن</div>
      </div>`;
    return;
  }
  const isMorning=CURRENT_SHIFT.type==='صبح';
  mc.innerHTML=`
    <div class="shift-header ${isMorning?'sh-morning':'sh-evening'}">
      <div>
        <div class="sh-title">شيفت ${CURRENT_SHIFT.type} ${isMorning?'🌅':'🌙'}</div>
        <div class="sh-sub">بدأ ${CURRENT_SHIFT.startTime||''} — ${CURRENT_SHIFT.startDate||''}</div>
      </div>
      <div class="sh-time" id="live-clock"></div>
    </div>

    <div class="kards">
      <div class="kard k-cash"><div class="kl">نقدي</div><div class="kv">${fmt(DATA.cash)}</div></div>
      <div class="kard k-elec"><div class="kl">دفع إلكتروني</div><div class="kv">${fmt(DATA.elec)}</div></div>
      <div class="kard k-exp"><div class="kl">مصاريف الشيفت</div><div class="kv">${fmt(totExp())}</div></div>
      <div class="kard k-net"><div class="kl">صافي الشيفت</div><div class="kv">${fmt(netShift())}</div></div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <div class="card-head">تفاصيل المصاريف</div>
      <div class="card-body">
        ${DATA.dailyExps.length
          ?DATA.dailyExps.map(e=>`<div class="exp-row"><span style="color:var(--text2)">${e.cat}</span><span style="font-weight:700;color:#FCA5A5">${fmt(e.amt)}</span></div>`).join('')
          :'<div style="text-align:center;font-size:12px;color:var(--text3)">لا يوجد مصاريف</div>'}
      </div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <div class="card-head">حضور وغياب</div>
      <div class="card-body">
        ${EMPS.length
          ?EMPS.map((e,i)=>`
          <div class="emp-row ${e.present?'P':''}" id="er${i}">
            <div style="display:flex;align-items:center;gap:8px">
              <div style="width:30px;height:30px;border-radius:50%;background:#1E3A8A;color:#93C5FD;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">${e.name?.substring(0,2)}</div>
              <div><div style="font-size:12px;font-weight:600;color:var(--text1)">${e.name}</div><div style="font-size:10px;color:var(--text3)">${e.role}</div></div>
            </div>
            <div style="display:flex;gap:4px">
              <div class="ab ${e.present?'P':''}" onclick="setAtt(${i},true)">حاضر</div>
              <div class="ab ${!e.present?'A':''}" onclick="setAtt(${i},false)">غائب</div>
            </div>
          </div>`).join('')
          :'<div style="text-align:center;font-size:12px;color:var(--text3)">لا يوجد موظفين</div>'}
      </div>
    </div>

    <div class="card" style="margin-bottom:10px">
      <div class="card-head">ملاحظة (اختياري)</div>
      <div class="card-body">
        <textarea class="finp" id="close-note" placeholder="أي ملاحظة على الشيفت..." style="height:50px;resize:none;width:100%"></textarea>
      </div>
    </div>

    <div style="padding:10px 12px;background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:10px;font-size:11px;color:#FCD34D;margin-bottom:10px">
      بعد التقفيل: شيفت ${isMorning?'مسا':'صبح'} ${isMorning?'🌙':'🌅'} هيفتح تلقائي
    </div>

    <button class="close-btn ${isMorning?'':'evening'}" onclick="closeShift()">
      تقفيل شيفت ${CURRENT_SHIFT.type} ${isMorning?'🌅':'🌙'}
    </button>`;
}

window.setAtt=function(i,v){
  EMPS[i].present=v;
  document.getElementById('er'+i).className='emp-row '+(v?'P':'');
  document.querySelectorAll(`#er${i} .ab`).forEach((b,j)=>{
    b.className='ab '+(j===0&&v?'P':j===1&&!v?'A':'');
  });
};

// ===== RECEIPT =====
function showReceipt(shift, data, emps, closedBy, note){
  const present=emps.filter(e=>e.present);
  const absent=emps.filter(e=>!e.present);
  document.getElementById('rcpt-content').innerHTML=`
    <div class="rh">
      <div class="rh-name">Camp Game Zone</div>
      <div class="rh-sub">كافيه وبلايستيشن</div>
      <div class="rh-type">تقفيل شيفت ${shift.type}</div>
    </div>
    <div class="rm">
      <div class="mr"><span>الكاشير</span><span>${closedBy}</span></div>
      <div class="mr"><span>التاريخ</span><span>${shift.startDate||dateStr()}</span></div>
      <div class="mr"><span>بداية الشيفت</span><span>${shift.startTime||'—'}</span></div>
      <div class="mr"><span>نهاية الشيفت</span><span>${nowT()}</span></div>
    </div>
    <div class="rsection">
      <div class="rsec-title">الإيرادات</div>
      <div class="rrow"><span>نقدي</span><span>${fmt(data.cash)}</span></div>
      <div class="rrow"><span>دفع إلكتروني</span><span>${fmt(data.elec)}</span></div>
      <div class="rrow bold"><span>إجمالي الإيرادات</span><span>${fmt(totIncome())}</span></div>
    </div>
    <div class="rsection">
      <div class="rsec-title">المصاريف</div>
      ${data.dailyExps.length
        ?data.dailyExps.map(e=>`<div class="rrow"><span>${e.cat}</span><span>${fmt(e.amt)}</span></div>`).join('')
        +'<div class="rrow bold"><span>إجمالي المصاريف</span><span>'+fmt(totExp())+'</span></div>'
        :'<div class="rrow"><span>لا يوجد مصاريف</span><span>—</span></div>'}
    </div>
    <div class="rtotal">
      <div class="rtotal-row"><span>صافي الشيفت</span><span>${fmt(netShift())}</span></div>
    </div>
    <div class="rsection">
      <div class="rsec-title">الحاضرين</div>
      ${present.map(e=>`<div class="rrow"><span>${e.name}</span><span>✓ حاضر</span></div>`).join('')}
      ${absent.map(e=>`<div class="rrow"><span style="color:#999">${e.name}</span><span style="color:#999">— غائب</span></div>`).join('')}
    </div>
    ${note?`<div class="rsection"><div class="rsec-title">ملاحظة</div><div style="font-size:11px">${note}</div></div>`:''}
    <div class="rf">
      <div class="rf-dots">- - - - - - - - - - - -</div>
      شكراً لزيارتكم
      <div class="rf-brand">Camp Game Zone</div>
    </div>`;
  document.getElementById('rcpt-view').style.display='flex';
}

window.closeReceipt=function(){
  document.getElementById('rcpt-view').style.display='none';
  init();
};

// ===== INIT =====
async function init(){
  await loadCurrentShift();
  // If no shift exists, create first morning shift
  if(!CURRENT_SHIFT){
    try{
      await addDoc(collection(db,'shifts'),{
        type:'صبح',status:'open',
        dayKey:todayKey(),
        shiftKey:`${todayKey()}_صبح`,
        startTime:nowT(),startDate:dateStr(),
        timestamp:serverTimestamp()
      });
      await loadCurrentShift();
    }catch(e){}
  }
  await loadShiftData();
  render();
}

setInterval(()=>{
  const c=document.getElementById('clock');
  if(c)c.textContent=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  const lc=document.getElementById('live-clock');
  if(lc)lc.textContent=new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

requireAuth(async(user,userData)=>{
  const isAdm=user.uid===ADMIN_UID;
  currentUser=isAdm?'Admin':(userData?.name||user.email);
  document.getElementById('uname').textContent=currentUser;
  await init();
});
</script>
</body>
</html>
